<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PA Journey Simulator — StarCare Health</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap');

:root{
  --bg:#0D0F14;
  --surface:#13161E;
  --card:#181C27;
  --card2:#1E2333;
  --border:#252A3A;
  --border2:#2E3448;
  --text:#F0F2F8;
  --text2:#8B93B0;
  --text3:#525A73;
  --accent:#6366F1;
  --accent2:#818CF8;
  --accent-bg:rgba(99,102,241,0.12);
  --accent-border:rgba(99,102,241,0.3);
  --teal:#14B8A6;
  --teal-bg:rgba(20,184,166,0.1);
  --teal-border:rgba(20,184,166,0.25);
  --rose:#F43F5E;
  --rose-bg:rgba(244,63,94,0.1);
  --rose-border:rgba(244,63,94,0.25);
  --amber:#F59E0B;
  --amber-bg:rgba(245,158,11,0.1);
  --amber-border:rgba(245,158,11,0.25);
  --green:#10B981;
  --green-bg:rgba(16,185,129,0.1);
  --green-border:rgba(16,185,129,0.25);
  --violet:#A78BFA;
  --violet-bg:rgba(167,139,250,0.1);
  --violet-border:rgba(167,139,250,0.25);
  --r:14px;
  --r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}50%{box-shadow:0 0 20px 4px rgba(99,102,241,0.18)}}
@keyframes typeDot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes checkPop{0%{transform:scale(0) rotate(-10deg)}70%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0deg)}}

.fade-up{animation:fadeUp 0.35s cubic-bezier(.22,1,.36,1) both}
.fade-in{animation:fadeIn 0.25s ease both}
.slide-right{animation:slideRight 0.32s cubic-bezier(.22,1,.36,1) both}
.slide-left{animation:slideLeft 0.32s cubic-bezier(.22,1,.36,1) both}
.pop-in{animation:popIn 0.28s cubic-bezier(.22,1,.36,1) both}
.check-pop{animation:checkPop 0.4s cubic-bezier(.22,1,.36,1) both}

/* ─── LAYOUT ─── */
#app{max-width:680px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* ─── HEADER ─── */
#hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
#hdr-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#hdr-logo i{font-size:19px;color:#fff}
#hdr-info h1{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em}
#hdr-info p{font-size:11px;color:var(--text3);margin-top:2px}
#hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px}
#mode-toggle{width:32px;height:32px;border-radius:8px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
#mode-toggle:hover{border-color:var(--accent-border);background:var(--accent-bg)}
#mode-toggle i{font-size:15px;color:var(--text2)}

/* ─── PROGRESS AREA ─── */
#progress-area{margin-bottom:1.25rem}
#progress-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
#progress-label{font-size:12px;font-weight:500;color:var(--text2)}
#progress-pct{font-size:11px;color:var(--text3)}
#progress-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
#progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366F1,#8B5CF6,#A78BFA);transition:width 0.5s cubic-bezier(.22,1,.36,1)}

/* ─── TIMELINE ─── */
#tl-wrap{display:flex;align-items:flex-start;gap:0;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:2px}
#tl-wrap::-webkit-scrollbar{height:0}
.tl-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:60px;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:1px;background:var(--border);z-index:0;transition:background .3s}
.tl-item.done::after{background:linear-gradient(90deg,#6366F1,#8B5CF6)}
.tl-dot{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:1;position:relative;border:2px solid var(--border);background:var(--card);transition:all .3s;font-size:11px;font-weight:600;color:var(--text3)}
.tl-item.done .tl-dot{background:linear-gradient(135deg,#6366F1,#8B5CF6);border-color:transparent;color:#fff}
.tl-item.active .tl-dot{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.tl-item.active .tl-dot{animation:glow 2.5s ease-in-out infinite}
.tl-lbl{font-size:9px;margin-top:5px;text-align:center;line-height:1.3;max-width:54px}
.tl-item.done .tl-lbl{color:var(--accent2)}
.tl-item.active .tl-lbl{color:var(--accent2);font-weight:600}
.tl-item:not(.done):not(.active) .tl-lbl{color:var(--text3)}

/* ─── STAGE CARD ─── */
#stage-card{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;transition:all .3s}
#stage-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;transition:all .3s}
#stage-meta-tag{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
#stage-meta-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.2}
#stage-meta-sub{font-size:12px;color:var(--text3);margin-top:3px}
#scene-counter{margin-left:auto;flex-shrink:0;font-size:11px;font-weight:600;color:var(--text3);background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:3px 10px;white-space:nowrap}

/* ─── CHAT ─── */
#chat{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem;min-height:200px}

.narrator-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.narrator-line{flex:1;height:1px;background:var(--border)}
.narrator-text{font-size:11px;color:var(--text3);font-style:italic;padding:0 10px;white-space:nowrap}

.msg-row{display:flex;align-items:flex-end;gap-10px gap:9px}
.msg-row.right{flex-direction:row-reverse}
.av-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.av-name{font-size:9px;font-weight:500;color:var(--text3);text-align:center;max-width:40px;line-height:1.2}
.bub-wrap{max-width:72%;display:flex;flex-direction:column;gap:2px}
.msg-row.right .bub-wrap{align-items:flex-end}
.bub{padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.65;position:relative}
.bub.L{background:var(--card);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
.bub.R{background:var(--accent-bg);border:1px solid var(--accent-border);color:#C7D2FE;border-bottom-right-radius:4px}
.bub.R2{background:var(--teal-bg);border:1px solid var(--teal-border);color:#99F6E4;border-bottom-right-radius:4px}
.bub b{font-weight:600;color:var(--text)}
.bub.R b{color:#E0E7FF}
.bub.R2 b{color:#CCFBF1}

.typing-indicator{display:flex;align-items:center;gap:4px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.typing-dot:nth-child(1){animation:typeDot 1.2s ease 0s infinite}
.typing-dot:nth-child(2){animation:typeDot 1.2s ease 0.2s infinite}
.typing-dot:nth-child(3){animation:typeDot 1.2s ease 0.4s infinite}

/* ─── INFO CARDS ─── */
.info-card{border-radius:var(--r2);padding:11px 14px;font-size:13px;line-height:1.6;margin-left:43px;max-width:80%;border:1px solid}
.info-card i{font-size:13px;vertical-align:-1px;margin-right:5px}
.info-card.info{background:var(--accent-bg);border-color:var(--accent-border);color:#C7D2FE}
.info-card.info i{color:var(--accent2)}
.info-card.warn{background:var(--amber-bg);border-color:var(--amber-border);color:#FDE68A}
.info-card.warn i{color:var(--amber)}
.info-card.danger{background:var(--rose-bg);border-color:var(--rose-border);color:#FECDD3}
.info-card.danger i{color:var(--rose)}
.info-card.success{background:var(--green-bg);border-color:var(--green-border);color:#A7F3D0}
.info-card.success i{color:var(--green)}
.info-card b,.info-card strong{font-weight:600;color:inherit;opacity:1}

/* ─── FLOW STRIP ─── */
.flow-strip{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-left:43px;max-width:88%}
.flow-node{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text);font-weight:500;white-space:nowrap}
.flow-arrow{color:var(--text3);font-size:12px}

/* ─── CHECKLIST ─── */
.checklist{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-left:43px;max-width:86%}
.cl-row{display:flex;align-items:flex-start;gap:11px;padding:10px 13px;border-bottom:1px solid var(--border)}
.cl-row:last-child{border-bottom:none}
.cl-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.cl-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.cl-desc{font-size:12px;color:var(--text2);line-height:1.5}

/* ─── STAT BADGE ─── */
.stat-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid;margin-left:43px}

/* ─── CHOICES ─── */
#choices-wrap{margin-top:4px}
.choices-hdr{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.choices-hdr::before{content:'';flex:1;height:1px;background:var(--border)}
.choices-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choice-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;cursor:pointer;text-align:left;transition:all .18s;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,0.05),transparent);opacity:0;transition:opacity .18s}
.choice-btn:hover{border-color:var(--accent-border);background:var(--accent-bg);transform:translateY(-1px)}
.choice-btn:hover::before{opacity:1}
.choice-btn.chosen{border-color:var(--accent);background:var(--accent-bg)}
.choice-btn:disabled{opacity:.45;cursor:default;transform:none}
.c-icon{font-size:19px;color:var(--accent2);margin-bottom:6px;display:block}
.c-title{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:3px;line-height:1.3}
.c-desc{font-size:12px;color:var(--text3);line-height:1.4}
.next-btn{width:100%;margin-top:9px;padding:11px;border-radius:var(--r2);border:1px solid var(--border);background:var(--card);font-size:13.5px;font-weight:500;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s;font-family:'Inter',sans-serif}
.next-btn:hover{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent2)}
.next-btn i{font-size:15px}

/* ─── GLOSSARY ─── */
#glossary-wrap{margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.25rem}
.gls-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:0;margin-bottom:0;user-select:none}
.gls-hdr-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text2)}
.gls-hdr-left i{font-size:16px;color:var(--text3)}
.gls-toggle{font-size:13px;color:var(--text3);transition:transform .2s}
.gls-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;display:none}
.gls-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px}
.gls-term{font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:4px}
.gls-def{font-size:12px;color:var(--text2);line-height:1.5}

/* ─── FINISH ─── */
#finish{display:none;margin-top:1rem}
.finish-banner{background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.finish-banner i{font-size:26px;color:var(--green);flex-shrink:0}
.finish-banner h3{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#A7F3D0}
.finish-banner p{font-size:12px;color:#6EE7B7;margin-top:2px}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px}
.metric-val{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:var(--text)}
.metric-lbl{font-size:11px;color:var(--text3);margin-top:3px}
.tk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tk-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:13px}
.tk-hdr{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tk-hdr i{font-size:13px}
.tk-card ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.tk-card li{font-size:12.5px;color:var(--text2);padding-left:15px;position:relative;line-height:1.5}
.tk-card li::before{content:'→';position:absolute;left:0;color:var(--text3);font-size:11px;top:1px}
.restart-btn{width:100%;padding:12px;border-radius:var(--r2);border:1px solid var(--border);background:var(--card);font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s;font-family:'Inter',sans-serif}
.restart-btn:hover{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent2)}
.restart-btn i{font-size:16px}

/* ─── SPEEED CONTROL ─── */
#speed-wrap{display:flex;align-items:center;gap:8px;margin-bottom:1rem;padding:9px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2)}
#speed-wrap label{font-size:11px;color:var(--text3);white-space:nowrap}
.speed-btn{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .14s;font-family:'Inter',sans-serif}
.speed-btn.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2)}
.speed-btn:hover:not(.active){border-color:var(--border2);color:var(--text2)}
#auto-play-btn{margin-left:auto;display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .14s;font-family:'Inter',sans-serif}
#auto-play-btn:hover{border-color:var(--accent-border);color:var(--accent2);background:var(--accent-bg)}
#auto-play-btn i{font-size:13px}

/* ─── TOOLTIPS ─── */
.has-tip{position:relative;cursor:help;border-bottom:1px dashed var(--accent-border)}
.tip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:11.5px;color:var(--text2);width:200px;z-index:100;pointer-events:none;opacity:0;transition:opacity .15s;line-height:1.5;font-style:normal}
.has-tip:hover .tip-box{opacity:1}

/* ─── SCENE JUMP ─── */
#scene-jump-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.sj-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .14s;font-family:'Inter',sans-serif;letter-spacing:.02em}
.sj-btn:hover{border-color:var(--accent-border);color:var(--accent2)}
.sj-btn.current{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.sj-btn.visited{border-color:var(--green-border);color:var(--green)}

/* ─── LIGHT MODE ─── */
body.light{
  --bg:#F1F5FB;--surface:#FFFFFF;--card:#FFFFFF;--card2:#F8FAFF;--border:#E2E8F4;--border2:#D1D9F0;
  --text:#1E2340;--text2:#4A5472;--text3:#94A3C0;
  --accent-bg:rgba(99,102,241,0.07);--accent-border:rgba(99,102,241,0.22);
  --teal-bg:rgba(20,184,166,0.07);--teal-border:rgba(20,184,166,0.2);
  --rose-bg:rgba(244,63,94,0.07);--rose-border:rgba(244,63,94,0.2);
  --amber-bg:rgba(245,158,11,0.07);--amber-border:rgba(245,158,11,0.2);
  --green-bg:rgba(16,185,129,0.07);--green-border:rgba(16,185,129,0.2);
}
body.light .bub.L{background:#F8FAFF;border-color:var(--border)}
body.light .bub.R{background:rgba(99,102,241,.08);color:#3730A3}
body.light .bub.R2{background:rgba(20,184,166,.08);color:#115E59}
body.light .bub.R b{color:#3730A3}
body.light .bub.R2 b{color:#0D4E46}
body.light .info-card.info{color:#3730A3}
body.light .info-card.warn{color:#92400E}
body.light .info-card.danger{color:#9F1239}
body.light .info-card.success{color:#065F46}
body.light .finish-banner h3{color:#065F46}
body.light .finish-banner p{color:#047857}
body.light #hdr-logo{background:linear-gradient(135deg,#4F46E5,#7C3AED)}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="hdr" class="fade-up">
    <div id="hdr-logo"><i class="ti ti-heart-rate-monitor"></i></div>
    <div id="hdr-info">
      <h1>PA Journey Simulator</h1>
      <p>StarCare Health · Illustrative example · Healthcare education</p>
    </div>
    <div id="hdr-right">
      <span class="pill" style="background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent2)">8 scenes</span>
      <div id="mode-toggle" title="Toggle light/dark mode" onclick="toggleMode()"><i class="ti ti-sun" id="mode-icon"></i></div>
    </div>
  </div>

  <!-- SPEED + AUTOPLAY -->
  <div id="speed-wrap" class="fade-up" style="animation-delay:.05s">
    <label>Speed:</label>
    <button class="speed-btn" onclick="setSpeed(0.5)">Slow</button>
    <button class="speed-btn active" onclick="setSpeed(1)">Normal</button>
    <button class="speed-btn" onclick="setSpeed(2)">Fast</button>
    <button class="speed-btn" onclick="setSpeed(0)">Instant</button>

/* ═══════════════════════════════════════
   GLOSSARY DATA
═══════════════════════════════════════ */
const GLOSSARY = [
  {term:'Prior Authorization (PA)', def:'Payer requirement that a provider obtain approval before prescribing a drug or procedure. Without PA, the claim is denied.'},
  {term:'Step Therapy', def:'A "fail-first" policy requiring patients to try cheaper drugs before a more expensive option is authorized.'},
  {term:'ICD-10 Code', def:'A standardized diagnosis code used by providers and payers to classify diseases. Must exactly match payer-approved indications.'},
  {term:'Letter of Medical Necessity', def:'A physician letter to a payer justifying a specific treatment as medically necessary for a specific patient.'},
  {term:'Biologic', def:'A complex drug derived from biological sources (proteins, cells). Used for autoimmune conditions like RA. Typically $5,000–$20,000/month.'},
  {term:'Appeal', def:'A formal request to overturn a payer\'s denial decision, supported by medical documentation and clinical evidence.'},
  {term:'IRO (Independent Review Org)', def:'A third-party organization that reviews denied claims. IRO decisions in the patient\'s favor are binding on the insurer.'},
  {term:'ePA (Electronic PA)', def:'Digital PA submission between provider and payer systems, dramatically reducing turnaround from 14+ days to hours.'},
];

const $=id=>document.getElementById(id);

function delay(ms){ return new Promise(r=>{ const t=setTimeout(r, ms/speedMult); pendingTimers.push(t); }); }

function clearPending(){ pendingTimers.forEach(t=>clearTimeout(t)); pendingTimers=[]; }

function addAnim(el, cls, delayMs=0){
  el.style.animationDelay = delayMs+'ms';
  el.classList.add(cls);
}

/* ═══════════════════════════════════════
   BUBBLE BUILDERS
═══════════════════════════════════════ */
function makeNarrator(text){
  const d=document.createElement('div');
  d.className='narrator-row';
  const l=document.createElement('div'); l.className='narrator-line';
  const t=document.createElement('div'); t.className='narrator-text'; t.textContent=text;
  const r=document.createElement('div'); r.className='narrator-line';
  d.appendChild(l); d.appendChild(t); d.appendChild(r);
  return d;
}

function makeBubble(m){
  const isRight = m.t==='R'||m.t==='R2';
  const row=document.createElement('div');
  row.className='msg-row'+(isRight?' right':'');

  const avWrap=document.createElement('div'); avWrap.className='av-wrap';
  const av=document.createElement('div'); av.className='avatar'; av.textContent=m.av;
  const nm=document.createElement('div'); nm.className='av-name'; nm.textContent=m.name||'';
  avWrap.appendChild(av); avWrap.appendChild(nm);

  const bubWrap=document.createElement('div'); bubWrap.className='bub-wrap';
  const bub=document.createElement('div');
  bub.className='bub '+m.t;
  bub.innerHTML=m.text;
  bubWrap.appendChild(bub);

  row.appendChild(avWrap); row.appendChild(bubWrap);
  addAnim(row, isRight?'slide-left':'slide-right');
  return row;
}

function makeTyping(){
  const row=document.createElement('div');
  row.className='msg-row';
  const av=document.createElement('div'); av.className='avatar'; av.textContent='⏳';
  const ind=document.createElement('div'); ind.className='typing-indicator';
  [0,1,2].forEach(()=>{
    const d=document.createElement('div'); d.className='typing-dot'; ind.appendChild(d);
  });
  row.appendChild(av); row.appendChild(ind);
  return row;
}

function makeInfoCard(m){
  const d=document.createElement('div');
  d.className='info-card '+m.style;
  const ico=document.createElement('i'); ico.className='ti '+m.icon;
  d.appendChild(ico);
  const sp=document.createElement('span'); sp.innerHTML=m.text;
  d.appendChild(sp);
  addAnim(d,'fade-up');
  return d;
}

function makeFlow(nodes){
  const d=document.createElement('div'); d.className='flow-strip';
  nodes.forEach((n,i)=>{
    const nd=document.createElement('span'); nd.className='flow-node'; nd.textContent=n;
    d.appendChild(nd);
    if(i<nodes.length-1){
      const arr=document.createElement('span'); arr.className='flow-arrow'; arr.textContent='→';
      d.appendChild(arr);
    }
  });
  addAnim(d,'fade-up');
  return d;
}

function makeChecklist(items){
  const wrap=document.createElement('div'); wrap.className='checklist';
  items.forEach((item,i)=>{
    const row=document.createElement('div'); row.className='cl-row';
    const ico=document.createElement('i');
    ico.className='ti '+item.icon+' cl-icon';
    ico.style.color=item.color;
    const txt=document.createElement('div');
    const lbl=document.createElement('div'); lbl.className='cl-label'; lbl.textContent=item.label;
    const desc=document.createElement('div'); desc.className='cl-desc'; desc.textContent=item.desc;
    txt.appendChild(lbl); txt.appendChild(desc);
    row.appendChild(ico); row.appendChild(txt);
    wrap.appendChild(row);
  });
  addAnim(wrap,'fade-up');
  return wrap;
}

/* ═══════════════════════════════════════
   RENDER MESSAGES
═══════════════════════════════════════ */
async function renderMessages(messages){
  const chat=$('chat');
  for(let i=0;i<messages.length;i++){
    const m=messages[i];
    if(speedMult>0) await delay(BASE_DELAY);

    let node;
    if(m.t==='n') node=makeNarrator(m.text);
    else if(m.t==='L'||m.t==='R'||m.t==='R2'){
      if(speedMult>0){
        const typ=makeTyping(); chat.appendChild(typ); chat.scrollTop=chat.scrollHeight;
        await delay(520);
        chat.removeChild(typ);
      }
      node=makeBubble(m);
    }
    else if(m.t==='info') node=makeInfoCard(m);
    else if(m.t==='flow') node=makeFlow(m.nodes);
    else if(m.t==='checklist') node=makeChecklist(m.items);

    if(node){ chat.appendChild(node); chat.scrollTop=chat.scrollHeight; }
  }
}

/* ═══════════════════════════════════════
   CHOICES
═══════════════════════════════════════ */
function renderChoices(choices, sceneIdx){
  const area=$('choices-wrap');
  area.innerHTML='';

  const hdr=document.createElement('div');
  hdr.className='choices-hdr'; hdr.textContent='Choose your path';
  area.appendChild(hdr);

  const grid=document.createElement('div'); grid.className='choices-grid';

  choices.forEach(c=>{
    const btn=document.createElement('div');
    btn.className='choice-btn pop-in';
    btn.setAttribute('role','button');
    btn.setAttribute('tabindex','0');

    const ic=document.createElement('i'); ic.className='ti '+c.icon+' c-icon';
    const tt=document.createElement('span'); tt.className='c-title'; tt.textContent=c.title;
    const dd=document.createElement('span'); dd.className='c-desc'; dd.textContent=c.desc;
    btn.appendChild(ic); btn.appendChild(tt); btn.appendChild(dd);

    const pick=async()=>{
      grid.querySelectorAll('.choice-btn').forEach(b=>{
        b.style.opacity='0.35'; b.style.pointerEvents='none';
      });
      btn.style.opacity='1'; btn.classList.add('chosen');
      btn.style.pointerEvents='none';

      const chat=$('chat');
      if(speedMult>0){ await delay(180); }
      if(speedMult>0){
        const typ=makeTyping(); chat.appendChild(typ); chat.scrollTop=chat.scrollHeight;
        await delay(600);
        chat.removeChild(typ);
      }
      const node=makeBubble(c.reply);
      chat.appendChild(node);
      chat.scrollTop=chat.scrollHeight;

      await delay(700);
      area.innerHTML='';

      if(sceneIdx<SCENES.length-1){
        const nb=document.createElement('button'); nb.className='next-btn';
        nb.innerHTML='<i class="ti ti-arrow-right"></i> Continue to next scene';
        nb.addEventListener('click',()=>loadScene(sceneIdx+1));
        area.appendChild(nb);
        if(autoPlay){ autoTimer=setTimeout(()=>loadScene(sceneIdx+1), 2200/speedMult); }
      } else {
        showFinish();
      }
    };

    btn.addEventListener('click',pick);
    btn.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' ')pick(); });
    grid.appendChild(btn);
  });

  area.appendChild(grid);
}

/* ═══════════════════════════════════════
   TIMELINE + PROGRESS
═══════════════════════════════════════ */
function buildTimeline(){
  const tl=$('tl-wrap');
  tl.innerHTML='';
  SCENES.forEach((s,i)=>{
    const item=document.createElement('div');
    item.className='tl-item'+(i<currentScene?' done':i===currentScene?' active':'');

    const dot=document.createElement('div'); dot.className='tl-dot';
    if(i<currentScene){
      const chk=document.createElement('i'); chk.className='ti ti-check check-pop';
      chk.style.fontSize='11px'; dot.appendChild(chk);
    } else { dot.textContent=i+1; }

    const lbl=document.createElement('div'); lbl.className='tl-lbl';
    lbl.textContent=s.tl.replace('\\n','\n');

    item.appendChild(dot); item.appendChild(lbl);
    tl.appendChild(item);
  });

  const pct=Math.round((currentScene/SCENES.length)*100);
  $('progress-fill').style.width=pct+'%';
  $('progress-pct').textContent=pct+'%';
  $('progress-label').textContent=currentScene===0?'Starting journey…':
    currentScene===SCENES.length?'Journey complete!':
    `Scene ${currentScene} of ${SCENES.length} complete`;
}

function buildSceneJump(){
  const wrap=$('scene-jump-wrap');
  wrap.innerHTML='';
  const lbl=document.createElement('span');
  lbl.style.cssText='font-size:10px;color:var(--text3);margin-right:2px;font-weight:600;letter-spacing:.06em;text-transform:uppercase';
  lbl.textContent='Jump:';
  wrap.appendChild(lbl);
  SCENES.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='sj-btn'+(i===currentScene?' current':visitedScenes.has(i)?' visited':'');
    btn.textContent=s.tl.replace(/\n/g,' ');
    btn.title='Go to: '+s.title;
    if(visitedScenes.has(i)||i===currentScene){
      btn.addEventListener('click',()=>{ clearPending(); clearTimeout(autoTimer); loadScene(i); });
    } else {
      btn.style.opacity='0.4'; btn.style.cursor='default';
    }
    wrap.appendChild(btn);
  });
}

/* ═══════════════════════════════════════
   STAGE HEADER
═══════════════════════════════════════ */
function buildStageHeader(s){
  $('stage-meta-tag').textContent=s.tag;
  $('stage-meta-title').textContent=s.title;
  $('stage-meta-sub').textContent=s.sub;
  $('scene-counter').textContent=`${currentScene+1} / ${SCENES.length}`;
  const ico=$('stage-icon');
  ico.style.background=s.iconBg;
  ico.innerHTML=`<i class="ti ${s.icon}" style="font-size:20px;color:${s.iconColor}"></i>`;
}

/* ═══════════════════════════════════════
   FINISH SCREEN
═══════════════════════════════════════ */
function showFinish(){
  const fin=$('finish');
  fin.style.display='block';
  fin.innerHTML='';

  const banner=document.createElement('div'); banner.className='finish-banner';
  banner.innerHTML='<i class="ti ti-circle-check"></i><div><h3>Simulation complete</h3><p>Rahul\'s Humira approved · PA ref: SCH-2024-RA-7741 · StarCare Health</p></div>';
  fin.appendChild(banner);

  const mrow=document.createElement('div'); mrow.className='metrics-row';
  [['14 days','Total resolution time'],['1 denial','Initial review result'],['1 appeal','Rounds filed']].forEach(([v,l])=>{
    const mc=document.createElement('div'); mc.className='metric-card';
    mc.innerHTML=`<div class="metric-val">${v}</div><div class="metric-lbl">${l}</div>`;
    mrow.appendChild(mc);
  });
  fin.appendChild(mrow);

  const tg=document.createElement('div'); tg.className='tk-grid';
  const data=[
    {icon:'ti-user', hdr:'Patient perspective', items:['PA required for most specialty biologics','A denial is never final — appeal it','Get and save your PA reference number','Step therapy can delay the right drug by months','Know the denial reason — it\'s your appeal roadmap','You can request the insurer expedite your review']},
    {icon:'ti-building-hospital', hdr:'System perspective', items:['Payers track denial rate, overturn rate, resolution time','High overturn rates signal over-restrictive PA criteria','AMA 2023: PA delays affect majority of patients','Each denial costs offices 2+ staff hours to resolve','ePA mandates aim to cut turnaround to under 24 hrs','IRO decisions in patient favor are binding on insurer']},
  ];
  data.forEach(d=>{
    const card=document.createElement('div'); card.className='tk-card';
    const hdr=document.createElement('div'); hdr.className='tk-hdr';
    hdr.innerHTML=`<i class="ti ${d.icon}"></i>${d.hdr}`;
    const ul=document.createElement('ul');
    d.items.forEach(item=>{
      const li=document.createElement('li'); li.textContent=item; ul.appendChild(li);
    });
    card.appendChild(hdr); card.appendChild(ul);
    tg.appendChild(card);
  });
  fin.appendChild(tg);

  const rb=document.createElement('button'); rb.className='restart-btn';
  rb.innerHTML='<i class="ti ti-refresh"></i> Restart simulation';
  rb.addEventListener('click',()=>{ fin.style.display='none'; fin.innerHTML=''; visitedScenes.clear(); loadScene(0); });
  fin.appendChild(rb);
  fin.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ═══════════════════════════════════════
   GLOSSARY
═══════════════════════════════════════ */
function buildGlossary(){
  const grid=$('gls-grid');
  grid.innerHTML='';
  GLOSSARY.forEach(g=>{
    const card=document.createElement('div'); card.className='gls-card';
    const term=document.createElement('div'); term.className='gls-term'; term.textContent=g.term;
    const def=document.createElement('div'); def.className='gls-def'; def.textContent=g.def;
    card.appendChild(term); card.appendChild(def);
    grid.appendChild(card);
  });
}
function toggleGlossary(){
  glossaryOpen=!glossaryOpen;
  $('gls-grid').style.display=glossaryOpen?'grid':'none';
  $('gls-chevron').style.transform=glossaryOpen?'rotate(180deg)':'';
}

/* ═══════════════════════════════════════
   SPEED + AUTOPLAY + MODE
═══════════════════════════════════════ */
function setSpeed(s){
  speedMult=s||999;
  document.querySelectorAll('.speed-btn').forEach((b,i)=>{
    b.classList.toggle('active',[0.5,1,2,0][i]===s);
  });
}
function toggleAuto(){
  autoPlay=!autoPlay;
  const btn=$('auto-play-btn');
  const ico=$('auto-icon');
  if(autoPlay){ ico.className='ti ti-player-pause'; btn.style.color='var(--amber)'; btn.style.borderColor='var(--amber-border)'; btn.style.background='var(--amber-bg)'; }
  else { ico.className='ti ti-player-play'; btn.style.color=''; btn.style.borderColor=''; btn.style.background=''; clearTimeout(autoTimer); }
}
function toggleMode(){
  lightMode=!lightMode;
  document.body.classList.toggle('light',lightMode);
  $('mode-icon').className=lightMode?'ti ti-moon':'ti ti-sun';
}

/* ═══════════════════════════════════════
   MAIN LOAD
═══════════════════════════════════════ */
async function loadScene(idx){
  currentScene=idx;
  visitedScenes.add(idx);
  const s=SCENES[idx];

  $('chat').innerHTML='';
  $('choices-wrap').innerHTML='';
  $('finish').style.display='none';
  $('finish').innerHTML='';

  buildTimeline();
  buildSceneJump();
  buildStageHeader(s);

  await renderMessages(s.messages);
  renderChoices(s.choices, idx);
}

/* ─── INIT ─── */
buildGlossary();
loadScene(0);
</script>

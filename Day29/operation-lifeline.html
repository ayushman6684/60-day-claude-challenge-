<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c12;
    --surface:   #111520;
    --card:      #161c2d;
    --border:    #1e2840;
    --accent:    #3b82f6;
    --accent2:   #6366f1;
    --green:     #10b981;
    --yellow:    #f59e0b;
    --red:       #ef4444;
    --orange:    #f97316;
    --purple:    #a855f7;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --dim:       #94a3b8;
    --radius:    14px;
    --radius-sm: 8px;
    --glow:      0 0 40px rgba(59,130,246,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  #root { min-height: 100vh; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Layout ── */
  .screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  .container { width: 100%; max-width: 900px; }

  /* ── Typography ── */
  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; line-height: 1.1; }
  h2 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800; line-height: 1.2; }
  h3 { font-size: 1.1rem; font-weight: 700; }

  .gradient-text {
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .card:hover { border-color: #2a3a5c; }

  .card-glow {
    box-shadow: var(--glow);
    border-color: rgba(59,130,246,0.3);
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    box-shadow: 0 4px 20px rgba(99,102,241,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.5); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: linear-gradient(135deg, #ef4444, #f97316);
    color: #fff;
  }
  .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239,68,68,0.4); }

  .btn-success {
    background: linear-gradient(135deg, #10b981, #0d9488);
    color: #fff;
  }
  .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.4); }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
  }
  .btn-outline:hover { background: rgba(59,130,246,0.1); }

  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

  .btn-lg { padding: 18px 40px; font-size: 17px; border-radius: var(--radius); }
  .btn-sm { padding: 8px 16px; font-size: 13px; }

  /* ── Progress Bars ── */
  .progress-track {
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 24px;
    background: rgba(255,255,255,0.35);
    border-radius: 99px;
    filter: blur(4px);
  }

  /* ── Tags / Badges ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .badge-red    { background: rgba(239,68,68,0.15);   color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .badge-yellow { background: rgba(245,158,11,0.15);  color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
  .badge-green  { background: rgba(16,185,129,0.15);  color: #6ee7b7; border: 1px solid rgba(16,185,129,0.25); }
  .badge-blue   { background: rgba(59,130,246,0.15);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
  .badge-purple { background: rgba(168,85,247,0.15);  color: #d8b4fe; border: 1px solid rgba(168,85,247,0.25); }
  .badge-orange { background: rgba(249,115,22,0.15);  color: #fdba74; border: 1px solid rgba(249,115,22,0.25); }

  /* ── Grid ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 640px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }

  /* ── Stat Boxes ── */
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
  }
  .stat-value { font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── Section headers ── */
  .section-header { margin-bottom: 28px; }
  .section-header p { color: var(--dim); margin-top: 8px; font-size: 15px; }

  /* ── Dividers ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  /* ── Selectable cards ── */
  .selectable {
    cursor: pointer;
    user-select: none;
    border: 2px solid var(--border);
    transition: all 0.18s ease;
  }
  .selectable:hover { border-color: var(--accent); transform: translateY(-2px); }
  .selectable.selected {
    border-color: var(--accent);
    background: rgba(59,130,246,0.08);
    box-shadow: 0 0 0 1px var(--accent), inset 0 0 20px rgba(59,130,246,0.06);
  }
  .selectable.disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ── Animations ── */
  @keyframes fadeIn  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse   { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }

  .fade-in { animation: fadeIn 0.4s ease forwards; }

  /* ── Welcome Screen ── */
  .welcome-bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 60% 50% at 70% 20%, rgba(99,102,241,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(16,185,129,0.08) 0%, transparent 60%),
      var(--bg);
  }

  .grid-overlay {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Crisis Banner ── */
  .crisis-banner {
    background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(249,115,22,0.1));
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--radius);
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
  }
  .crisis-banner::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ef4444, #f97316, #ef4444);
    animation: pulse 2s ease infinite;
  }

  /* ── Choice Button ── */
  .choice-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.18s;
    margin-bottom: 10px;
  }
  .choice-btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.07); }
  .choice-btn.chosen { border-color: var(--green); background: rgba(16,185,129,0.08); }
  .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Negotiation ── */
  .neg-meter {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .neg-label { font-size: 13px; color: var(--dim); width: 110px; flex-shrink: 0; font-weight: 500; }
  .neg-value { font-size: 13px; font-weight: 700; width: 42px; text-align: right; flex-shrink: 0; }

  /* ── Final dashboard score ring ── */
  .score-ring {
    width: 140px; height: 140px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .score-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .score-ring-text { font-size: 2.4rem; font-weight: 900; }
  .score-ring-sub  { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── Tooltip-style explainer ── */
  .explainer {
    background: rgba(59,130,246,0.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 13.5px;
    color: var(--dim);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .explainer strong { color: var(--text); }

  /* ── Step indicator ── */
  .step-bar {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 36px;
  }
  .step-dot {
    width: 28px; height: 6px;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.3s;
  }
  .step-dot.active { background: var(--accent); }
  .step-dot.done   { background: var(--green); }

  /* ── AI card ── */
  .ai-card {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ai-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(99,102,241,0.04), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .ai-card:hover { border-color: var(--accent2); transform: translateY(-3px); }
  .ai-card:hover::before { opacity: 1; }
  .ai-card.selected { border-color: var(--accent2); background: rgba(99,102,241,0.08); }
  .ai-card.disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

  /* ── feedback box ── */
  .feedback-box {
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    border: 1px solid;
  }
  .feedback-good   { background: rgba(16,185,129,0.08);  border-color: rgba(16,185,129,0.25); }
  .feedback-warn   { background: rgba(245,158,11,0.08);  border-color: rgba(245,158,11,0.25); }
  .feedback-danger { background: rgba(239,68,68,0.08);   border-color: rgba(239,68,68,0.25); }
  .feedback-info   { background: rgba(59,130,246,0.08);  border-color: rgba(59,130,246,0.25); }

  /* ── War room metric row ── */
  .metric-row { margin-bottom: 16px; }
  .metric-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .metric-name { font-size: 13px; font-weight: 600; color: var(--dim); }
  .metric-val  { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* Scrollable content */
  .scroll-content { overflow-y: auto; max-height: calc(100vh - 120px); }
</style>
</head>

<div id="root"></div>

<script type="text/babel">

// ─── DATA ───────────────────────────────────────────────────────────────────

const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function generateCompany() {
  const ind = pick(INDUSTRIES);
  const numCountries = rnd(2, 5);
  const selectedCountries = [];
  const shuffled = [...COUNTRIES].sort(() => Math.random() - 0.5);
  for (let i = 0; i < numCountries; i++) selectedCountries.push(shuffled[i]);

  return {
    name: pick(COMPANIES),
    industry: ind.name,
    emoji: ind.emoji,
    revenue: `$${rnd(1, 12)}.${rnd(1, 9)}B`,
    employees: `${rnd(8, 120)},${rnd(100, 999)}`,
    factories: rnd(3, 14),
    warehouses: rnd(8, 35),
    suppliers: rnd(40, 280),
    inventoryDays: rnd(18, 65),
    leadTime: rnd(14, 55),
    countries: selectedCountries,
    founded: rnd(1958, 2008),
    marketShare: `${rnd(4, 22)}%`,
  };
}

function generateCrisis(company) {
  const base = pick(CRISES);
  const country = pick(company.countries);
  return {
    ...base,
    summary: base.summary.replace("{country}", country),
    affectedCountry: country,
  };
}

function StepBar({ step, total = 8 }) {
  return (
    <div className="step-bar">
      {Array.from({ length: total }).map((_, i) => (
        <div
          key={i}
          className={`step-dot ${i < step ? "done" : i === step ? "active" : ""}`}
        />
      ))}
      <span style={{ fontSize: 12, color: "var(--muted)", marginLeft: 8 }}>
        Step {step + 1} of {total}
      </span>
    </div>
  );
}

function ProgressBar({ value, max = 100, color = "#3b82f6", animated = false }) {
  const pct = clamp((value / max) * 100, 0, 100);
  const bgColor =
    color === "green"  ? "var(--green)"  :
    color === "red"    ? "var(--red)"    :
    color === "yellow" ? "var(--yellow)" :
    color === "orange" ? "var(--orange)" :
    color === "purple" ? "var(--purple)" :
    color;

  return (
    <div className="progress-track">
      <div
        className="progress-fill"
        style={{
          width: `${pct}%`,
          background: `linear-gradient(90deg, ${bgColor}aa, ${bgColor})`,
          transition: animated ? "width 1.4s cubic-bezier(0.16,1,0.3,1)" : "none",
        }}
      />
    </div>
  );
}

function ScoreRing({ score }) {
  const r = 54;
  const circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  const color =
    score >= 75 ? "#10b981" :
    score >= 50 ? "#f59e0b" :
    "#ef4444";

  return (
    <div className="score-ring">
      <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
        <circle cx="70" cy="70" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="12" />
        <circle
          cx="70" cy="70" r={r}
          fill="none"
          stroke={color}
          strokeWidth="12"
          strokeLinecap="round"
          strokeDasharray={circ}
          strokeDashoffset={offset}
          style={{ transition: "stroke-dashoffset 1.5s cubic-bezier(0.16,1,0.3,1), stroke 0.5s" }}
        />
      </svg>
      <div style={{ textAlign: "center" }}>
        <div className="score-ring-text" style={{ color }}>{score}</div>
        <div className="score-ring-sub">/ 100</div>
      </div>
    </div>
  );
}

function WarRoomScreen({ crisis, onNext }) {
  const [selected, setSelected] = useState([]);
  const [simulated, setSimulated] = useState(false);
  const [metrics, setMetrics] = useState({
    cost: 70, inventory: 65, profit: 60, delivery: 55, satisfaction: 68
  });
  const [animated, setAnimated] = useState(false);

  function toggleAction(id) {
    if (simulated) return;
    setSelected(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : prev.length < 3 ? [...prev, id] : prev
    );
  }

  function simulate() {
    if (selected.length !== 3) return;
    const newMetrics = { ...metrics };
    selected.forEach(id => {
      const a = ACTIONS.find(x => x.id === id);
      if (!a) return;
      newMetrics.cost         = clamp(newMetrics.cost         + a.effects.cost,         5, 100);
      newMetrics.inventory    = clamp(newMetrics.inventory    + a.effects.inventory,    5, 100);
      newMetrics.delivery     = clamp(newMetrics.delivery     + a.effects.delivery,     5, 100);
      newMetrics.satisfaction = clamp(newMetrics.satisfaction + a.effects.satisfaction, 5, 100);
      newMetrics.profit       = clamp(newMetrics.profit       + a.effects.profit,       5, 100);
    });
    setMetrics(newMetrics);
    setSimulated(true);
    setTimeout(() => setAnimated(true), 100);
  }

  const metricDefs = [
    { key: "cost",         label: "Cost Control",        color: "green"  },
    { key: "inventory",    label: "Inventory Health",    color: "#3b82f6" },
    { key: "profit",       label: "Profit Margin",       color: "purple" },
    { key: "delivery",     label: "Delivery Speed",      color: "orange" },
    { key: "satisfaction", label: "Customer Satisfaction", color: "green" },
  ];

  return (
    <div className="screen">
      <div className="container fade-in">
        <StepBar step={3} />
        <div className="section-header">
          <div className="eyebrow">War Room</div>
          <h2>Choose Your Response Strategy</h2>
          <p>Select exactly <strong>3 actions</strong> from the 6 below. Read each carefully — tradeoffs are real and consequences are immediate.</p>
        </div>

        <div className="explainer">
          <strong>How to think about this:</strong> You can't do everything at once. Prioritize based on your biggest risk right now. 
          Is it stockouts? Focus on supply. Is it customer churn? Prioritize communication. Is it cost bleed? Triage demand.
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 24 }}>
          {ACTIONS.map(a => {
            const isSel = selected.includes(a.id);
            const maxed = selected.length >= 3 && !isSel;
            return (
              <div
                key={a.id}

// ─── SCREEN 5: NEGOTIATION ───────────────────────────────────────────────────

function NegotiationScreen({ onNext }) {
  const [round, setRound] = useState(0);
  const [chosen, setChosen] = useState([]);
  const [state, setState] = useState({ trust: 50, price: 50, lead: 50 });
  const [lastNote, setLastNote] = useState(null);
  const [showNote, setShowNote] = useState(false);

  function choose(opt) {
    const newState = {
      trust: clamp(state.trust + opt.trust, 0, 100),
      price: clamp(state.price + opt.price, 0, 100),
      lead:  clamp(state.lead  + opt.lead,  0, 100),
    };
    setState(newState);
    setChosen([...chosen, opt]);
    setLastNote(opt.note);
    setShowNote(true);
    setTimeout(() => {
      setShowNote(false);
      setTimeout(() => {
        if (round + 1 >= NEG_ROUNDS.length) {
          const score = Math.round((newState.trust * 0.4 + newState.price * 0.35 + newState.lead * 0.25));
          onNext({ ...newState, score });
        } else {
          setRound(round + 1);
        }
      }, 200);
    }, 2600);
  }

  const currentRound = NEG_ROUNDS[round];

  const meters = [
    { key: "trust", label: "Supplier Trust",   color: "green",  icon: "🤝" },
    { key: "price", label: "Price Favorability", color: "#3b82f6", icon: "💰" },
    { key: "lead",  label: "Lead Time",          color: "purple", icon: "⏱️" },
  ];

  return (
    <div className="screen">
      <div className="container fade-in">
        <StepBar step={4} />
        <div className="section-header">
          <div className="eyebrow">Supplier Negotiation</div>
          <h2>Round {round + 1} of 4: {currentRound.label}</h2>
          <p>{currentRound.context}</p>
        </div>

        <div className="card" style={{ marginBottom: 20, background: "rgba(99,102,241,0.06)", borderColor: "rgba(99,102,241,0.2)" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "var(--accent2)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>
            💬 Supplier says:
          </div>
          <p style={{ fontSize: 15, lineHeight: 1.7, fontStyle: "italic", color: "var(--dim)" }}>
            "{currentRound.situation}"
          </p>
        </div>

        <div className="card" style={{ marginBottom: 20 }}>
          <div style={{ marginBottom: 14, fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--muted)" }}>
            Negotiation Meters
          </div>
          {meters.map(({ key, label, color, icon }) => (
            <div key={key} className="neg-meter">
              <span className="neg-label">{icon} {label}</span>
              <div style={{ flex: 1 }}>
                <ProgressBar value={state[key]} color={color} animated={true} />
              </div>
              <span className="neg-value" style={{
                color: state[key] >= 65 ? "var(--green)" : state[key] >= 35 ? "var(--yellow)" : "var(--red)"
              }}>{state[key]}</span>
            </div>
          ))}
        </div>

        {!showNote ? (
          <div className="fade-in">
            <div style={{ marginBottom: 10, fontSize: 13, fontWeight: 600, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.08em" }}>
              Your Response:
            </div>
            {currentRound.options.map((opt, i) => (
              <button key={i} className="choice-btn" onClick={() => choose(opt)}>
                <strong style={{ color: "var(--accent)", marginRight: 8 }}>{String.fromCharCode(65 + i)}.</strong>
                {opt.text}
              </button>
            ))}
          </div>
        ) : (
          <div className="feedback-box feedback-info fade-in">
            <div style={{ fontWeight: 700, marginBottom: 8, color: "var(--accent)" }}>📋 Expert Analysis</div>
            <p style={{ color: "var(--dim)", lineHeight: 1.7 }}>{lastNote}</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SCREEN 6: CEO BOARDROOM ─────────────────────────────────────────────────

function BoardroomScreen({ onNext }) {
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [lastFeedback, setLastFeedback] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);

  function answer(opt) {
    setLastFeedback({ score: opt.score, text: opt.feedback });
    setShowFeedback(true);
    setAnswers([...answers, opt]);
    setTimeout(() => {
      setShowFeedback(false);
      setTimeout(() => {
        if (qIndex + 1 >= CEO_QUESTIONS.length) {
          const total = [...answers, opt].reduce((s, a) => s + a.score, 0);
          const max = CEO_QUESTIONS.length * 20;
          onNext(Math.round((total / max) * 100));
        } else {
          setQIndex(qIndex + 1);
        }
      }, 200);
    }, 3000);
  }

  const q = CEO_QUESTIONS[qIndex];

  return (
    <div className="screen">
      <div className="container fade-in">
        <StepBar step={5} />
        <div className="section-header">
          <div className="eyebrow">CEO Boardroom</div>
          <h2>Executive Decision-Making</h2>
          <p>Question {qIndex + 1} of {CEO_QUESTIONS.length} — these mirror the actual decisions supply chain executives face.</p>
        </div>

        <div className="card card-glow" style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: "var(--yellow)", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12 }}>
            🎯 Scenario
          </div>
          <p style={{ fontSize: 16, lineHeight: 1.8, fontWeight: 500, marginBottom: 16 }}>{q.q}</p>
          <div className="explainer" style={{ marginBottom: 0 }}>
            <strong>Why this matters:</strong> {q.why}
          </div>
        </div>

        {!showFeedback ? (
          <div className="fade-in">
            {q.options.map((opt, i) => (
              <button key={i} className="choice-btn" onClick={() => answer(opt)}>
                <strong style={{ color: "var(--accent)", marginRight: 8 }}>{String.fromCharCode(65 + i)}.</strong>
                {opt.text}
              </button>
            ))}
          </div>
        ) : (
          <div
            className={`feedback-box fade-in ${
              lastFeedback.score >= 16 ? "feedback-good" :
              lastFeedback.score >= 10 ? "feedback-warn" : "feedback-danger"
            }`}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontWeight: 700 }}>
                {lastFeedback.score >= 16 ? "✅ Strong Decision" :
                 lastFeedback.score >= 10 ? "⚠️ Acceptable" : "❌ Missed Opportunity"}
              </span>
              <span className="mono" style={{
                color: lastFeedback.score >= 16 ? "var(--green)" : lastFeedback.score >= 10 ? "var(--yellow)" : "var(--red)",
                fontWeight: 700
              }}>+{lastFeedback.score}/20</span>
            </div>
            <p style={{ color: "var(--dim)", lineHeight: 1.7 }}>{lastFeedback.text}</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SCREEN 8: FINAL DASHBOARD ────────────────────────────────────────────────

function FinalDashboard({ company, crisis, warMetrics, warActions, negResult, ceoScore, aiInvestments, onReplay }) {
  const [animated, setAnimated] = useState(false);
  useEffect(() => { setTimeout(() => setAnimated(true), 300); }, []);

  // Compute sub-scores
  const leadershipScore  = ceoScore;
  const negScore         = negResult.score;
  const resilienceScore  = clamp(Math.round((warMetrics.inventory + warMetrics.delivery) / 2 + (aiInvestments.includes("supplier_risk") ? 10 : 0)), 0, 100);
  const costScore        = clamp(warMetrics.cost + (aiInvestments.includes("procurement") ? 8 : 0), 0, 100);
  const riskScore        = clamp(Math.round(negScore * 0.4 + leadershipScore * 0.4 + (aiInvestments.includes("demand") ? 12 : 0)), 0, 100);
  const satisfScore      = clamp(warMetrics.satisfaction + (aiInvestments.includes("inventory") ? 6 : 0), 0, 100);

  const overallScore = clamp(Math.round(
    leadershipScore * 0.22 + negScore * 0.18 + resilienceScore * 0.18 +
    costScore * 0.15 + riskScore * 0.15 + satisfScore * 0.12
  ), 0, 100);

  const grade =
    overallScore >= 85 ? { label: "Supply Chain Visionary", color: "var(--green)"  } :
    overallScore >= 70 ? { label: "Operations Expert",      color: "var(--accent)" } :
    overallScore >= 55 ? { label: "Crisis Manager",         color: "var(--yellow)" } :
    overallScore >= 40 ? { label: "Learning Leader",        color: "var(--orange)" } :
                         { label: "Needs Development",      color: "var(--red)"    };

  // Identify best and worst
  const subScores = [
    { name: "Leadership",          v: leadershipScore },
    { name: "Negotiation",         v: negScore        },
    { name: "Resilience",          v: resilienceScore },
    { name: "Cost Control",        v: costScore       },
    { name: "Risk Management",     v: riskScore       },
    { name: "Customer Satisfaction", v: satisfScore   },
  ];
  const best  = subScores.reduce((a, b) => a.v > b.v ? a : b);
  const worst = subScores.reduce((a, b) => a.v < b.v ? a : b);

  const bestAction = ACTIONS.find(a => warActions[0] === a.id) || ACTIONS[0];

  const feedback =
    overallScore >= 85
      ? "Exceptional leadership. You balanced cost, resilience, and customer experience under extreme pressure. Companies led like this are 3x more likely to recover from disruptions faster than peers."
      : overallScore >= 70
      ? "Strong performance. You made sound decisions across the board, with some room to sharpen your cost and risk strategies. You're operating at a level most supply chain professionals aspire to."
      : overallScore >= 55
      ? "Solid foundation with clear growth areas. Your instincts in some areas were excellent, but under pressure, a few decisions cost you more than necessary. These patterns are fixable with deliberate practice."
      : "This simulation revealed important gaps in your supply chain decision-making. The good news: every expert in this field learned through exactly these kinds of mistakes. The insights below are your roadmap.";

  const recommendation =
    worst.name === "Negotiation"
      ? "Invest in structured negotiation training and playbooks. The best supply chain organizations have standard negotiation frameworks their teams use consistently — improvisation under pressure almost always costs money."
      : worst.name === "Cost Control"
      ? "Implement zero-based budgeting for supply chain decisions and create a cost-consequence scorecard for every response option. Visibility into cost impacts before decisions are made is the fastest lever."
      : worst.name === "Resilience"
      ? "Build a formal Supply Chain Risk Management (SCRM) program. This means mapping your Tier-1 and Tier-2 suppliers, maintaining backup qualification, and running quarterly disruption simulations like this one."
      : "Develop executive dashboards that connect supply chain KPIs directly to P&L outcomes. When leadership sees the direct link between supply chain decisions and financial results, decision quality improves rapidly.";

  const lessons = [
    "Resilient supply chains are built before crises, not during them. The best performers in this simulation had pre-built response playbooks.",
    "Supplier relationships are strategic assets. Trust built over years is destroyed in one aggressive negotiation move — and costs twice as much to rebuild.",
    "AI works best when it augments human judgment, not replaces it. The companies seeing 10x ROI from AI use it to surface risks humans would miss, not to automate all decisions.",
    `The ${crisis.type} you faced is the ${crisis.urgency === "CRITICAL" ? "most severe" : "second most common"} type of supply chain disruption globally. 73% of companies experience one every 3.7 years.`,
  ];

  const scoreBarDefs = [
    { key: "leadership",    label: "Leadership",          v: leadershipScore,  c: "#3b82f6" },
    { key: "negotiation",   label: "Negotiation",         v: negScore,         c: "#a855f7" },
    { key: "resilience",    label: "Resilience",          v: resilienceScore,  c: "#10b981" },
    { key: "cost",          label: "Cost Control",        v: costScore,        c: "#f59e0b" },
    { key: "risk",          label: "Risk Management",     v: riskScore,        c: "#6366f1" },
    { key: "satisfaction",  label: "Customer Satisfaction", v: satisfScore,    c: "#f97316" },
  ];

  return (
    <div className="screen">
      <div className="container fade-in">
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div className="eyebrow">Simulation Complete</div>
          <h2 style={{ marginBottom: 8 }}>Final Crisis Report</h2>
          <p style={{ color: "var(--muted)" }}>{company.name} · {crisis.type} Response</p>
        </div>

        {/* Score + Grade */}
        <div className="card card-glow" style={{ marginBottom: 20, textAlign: "center", padding: "32px 24px" }}>
          <ScoreRing score={animated ? overallScore : 0} />
          <div style={{ fontSize: 22, fontWeight: 800, color: grade.color, marginBottom: 4 }}>{grade.label}</div>
          <div style={{ fontSize: 14, color: "var(--muted)" }}>Overall Crisis Management Score</div>
        </div>

        {/* Sub scores */}
        <div className="card" style={{ marginBottom: 20 }}>
          <h3 style={{ marginBottom: 18 }}>Performance Breakdown</h3>
          {scoreBarDefs.map(({ label, v, c }) => (
            <div key={label} className="metric-row">
              <div className="metric-header">
                <span className="metric-name">{label}</span>
                <span className="metric-val" style={{ color: v >= 65 ? "var(--green)" : v >= 40 ? "var(--yellow)" : "var(--red)" }}>{v}</span>
              </div>
              <ProgressBar value={animated ? v : 0} color={c} animated={animated} />
            </div>
          ))}
        </div>

        {/* Best / Worst / Feedback */}
        <div className="grid-2" style={{ marginBottom: 20 }}>
          <div className="feedback-box feedback-good">
            <div style={{ fontWeight: 700, color: "var(--green)", marginBottom: 6 }}>🏆 Strongest Area</div>
            <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 4 }}>{best.name}</div>
            <div style={{ fontSize: 13, color: "var(--muted)" }}>Score: {best.v}/100</div>
          </div>
          <div className="feedback-box feedback-danger">
            <div style={{ fontWeight: 700, color: "var(--red)", marginBottom: 6 }}>⚠ Biggest Gap</div>
            <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 4 }}>{worst.name}</div>
            <div style={{ fontSize: 13, color: "var(--muted)" }}>Score: {worst.v}/100</div>
          </div>
        </div>

        <div className="feedback-box feedback-info" style={{ marginBottom: 20 }}>
          <div style={{ fontWeight: 700, color: "var(--accent)", marginBottom: 8 }}>📋 Performance Feedback</div>
          <p style={{ color: "var(--dim)", lineHeight: 1.7 }}>{feedback}</p>
        </div>

        <div className="card" style={{ marginBottom: 20 }}>
          <h3 style={{ marginBottom: 12 }}>🎯 Expert Recommendation</h3>
          <p style={{ color: "var(--dim)", lineHeight: 1.7, marginBottom: 16 }}>{recommendation}</p>
          <hr className="divider" style={{ margin: "16px 0" }} />
          <h3 style={{ marginBottom: 12 }}>📚 Key Lessons From This Crisis</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {lessons.map((l, i) => (
              <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ color: "var(--accent)", fontWeight: 700, flexShrink: 0, fontFamily: "monospace" }}>0{i + 1}</span>
                <p style={{ color: "var(--dim)", lineHeight: 1.6, fontSize: 14 }}>{l}</p>
              </div>
            ))}
          </div>
        </div>

        {/* AI investments recap */}
        <div className="card" style={{ marginBottom: 28 }}>
          <h3 style={{ marginBottom: 14 }}>🤖 Your AI Investment Portfolio</h3>
          <div className="grid-2">
            {aiInvestments.map(id => {
              const ai = AI_INVESTMENTS.find(a => a.id === id);
              return (
                <div key={id} style={{ background: "var(--surface)", borderRadius: "var(--radius-sm)", padding: "14px 16px", border: "1px solid var(--border)" }}>
                  <div style={{ fontSize: 22, marginBottom: 6 }}>{ai.icon}</div>
                  <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{ai.name}</div>
                  <div style={{ fontSize: 13, color: "var(--muted)" }}>{ai.tagline}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ display: "flex", gap: 12 }}>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={onReplay}>
            🔄 Play Again (New Crisis)
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen]           = useState("welcome");
  const [company, setCompany]         = useState(null);
  const [crisis, setCrisis]           = useState(null);
  const [warMetrics, setWarMetrics]   = useState(null);
  const [warActions, setWarActions]   = useState([]);
  const [negResult, setNegResult]     = useState(null);
  const [ceoScore, setCeoScore]       = useState(null);
  const [aiChoices, setAiChoices]     = useState([]);

  function startGame() {
    const c = generateCompany();
    const cr = generateCrisis(c);
    setCompany(c);
    setCrisis(cr);
    setScreen("company");
  }

  function replay() {
    setScreen("welcome");
    setCompany(null);
    setCrisis(null);
    setWarMetrics(null);
    setWarActions([]);
    setNegResult(null);
    setCeoScore(null);
    setAiChoices([]);
  }

  return (
    <div>
      {screen === "welcome" && (
        <WelcomeScreen onStart={startGame} />
      )}
      {screen === "company" && (
        <CompanyScreen company={company} onNext={() => setScreen("crisis")} />
      )}
      {screen === "crisis" && (
        <CrisisScreen company={company} crisis={crisis} onNext={() => setScreen("warroom")} />
      )}
      {screen === "warroom" && (
        <WarRoomScreen
          crisis={crisis}
          onNext={(metrics, actions) => {
            setWarMetrics(metrics);
            setWarActions(actions);
            setScreen("negotiation");
          }}
        />
      )}
      {screen === "negotiation" && (
        <NegotiationScreen
          onNext={result => {
            setNegResult(result);
            setScreen("boardroom");
          }}
        />
      )}
      {screen === "boardroom" && (
        <BoardroomScreen
          onNext={score => {
            setCeoScore(score);
            setScreen("ai");
          }}
        />
      )}
      {screen === "ai" && (
        <AIStrategyScreen
          onNext={choices => {
            setAiChoices(choices);
            setScreen("final");
          }}
        />
      )}
      {screen === "final" && (
        <FinalDashboard
          company={company}
          crisis={crisis}
          warMetrics={warMetrics}
          warActions={warActions}
          negResult={negResult}
          ceoScore={ceoScore}
          aiInvestments={aiChoices}
          onReplay={replay}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

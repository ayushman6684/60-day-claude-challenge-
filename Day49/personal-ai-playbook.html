<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Research Console — Your Personal AI Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================= TOKENS ============================= */
:root{
  --paper:#F3F1E9;
  --surface:#FFFFFF;
  --surface-2:#EAE7DB;
  --ink:#20241F;
  --ink-soft:#565B4F;
  --ink-faint:#8A8D7E;
  --rule:#D9D4C2;
  --rule-strong:#C7C1AA;
  --amber:#B8791E;
  --amber-strong:#9C6414;
  --amber-tint:#F3E4C8;
  --forest:#35604A;
  --forest-tint:#DEE8DF;
  --rust:#A83A32;
  --rust-tint:#F1DCD8;
  --shadow-card: 0 1px 2px rgba(32,36,31,0.06), 0 6px 16px rgba(32,36,31,0.06);
  --shadow-pop: 0 12px 32px rgba(32,36,31,0.18);
  --radius-s: 6px;
  --radius-m: 10px;
  --radius-l: 16px;
  --font-display:'Spectral', Georgia, 'Iowan Old Style', serif;
  --font-body:'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --sidebar-w: 248px;
  --transition: 180ms cubic-bezier(.4,0,.2,1);
}
html[data-theme="dark"]{
  --paper:#12161A;
  --surface:#181D22;
  --surface-2:#1F262C;
  --ink:#EAE6D9;
  --ink-soft:#B7B6A6;
  --ink-faint:#787D74;
  --rule:#2A3138;
  --rule-strong:#374049;
  --amber:#D89A42;
  --amber-strong:#F0B45C;
  --amber-tint:#33291A;
  --forest:#5FA47D;
  --forest-tint:#1B2B22;
  --rust:#D9776C;
  --rust-tint:#301F1D;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 6px 20px rgba(0,0,0,0.35);
  --shadow-pop: 0 16px 40px rgba(0,0,0,0.55);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; margin:0; color:var(--ink);}
p{margin:0;}
button{font-family:var(--font-body); cursor:pointer;}
a{color:inherit;}
::selection{background:var(--amber-tint); color:var(--ink);}
.mono{font-family:var(--font-mono);}
.hidden{display:none !important;}
.visually-hidden{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}

/* focus visibility */
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--amber); outline-offset:2px;
}

/* ============================= LAYOUT ============================= */
.app{display:flex; min-height:100vh;}

/* ---- Sidebar ---- */
.sidebar{
  width:var(--sidebar-w); flex-shrink:0; background:var(--surface);
  border-right:1px solid var(--rule); display:flex; flex-direction:column;
  position:fixed; top:0; left:0; bottom:0; z-index:40; transition:transform var(--transition);
}
.sidebar-brand{
  padding:22px 20px 16px; border-bottom:1px solid var(--rule);
}
.sidebar-brand .mark{
  display:flex; align-items:center; gap:10px;
}
.sidebar-brand .mark-icon{
  width:30px; height:30px; border-radius:7px; background:var(--amber);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
}
.sidebar-brand .mark-icon svg{width:16px; height:16px;}
.sidebar-brand .mark-title{font-family:var(--font-display); font-weight:700; font-size:16.5px; letter-spacing:0.2px;}
.sidebar-brand .mark-sub{font-size:11px; color:var(--ink-faint); margin-top:1px;}

.sidebar-nav{flex:1; overflow-y:auto; padding:14px 12px 12px;}
.nav-group-label{
  font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-faint);
  padding:14px 10px 6px; font-weight:600;
}
.nav-group-label:first-child{padding-top:4px;}
.nav-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  padding:8px 10px; border-radius:var(--radius-s); border:none; background:transparent;
  color:var(--ink-soft); font-size:13.6px; font-weight:500; margin-bottom:2px;
  transition:background var(--transition), color var(--transition);
}
.nav-item svg{width:16px; height:16px; flex-shrink:0; opacity:0.85;}
.nav-item:hover{background:var(--surface-2); color:var(--ink);}
.nav-item.active{background:var(--amber-tint); color:var(--amber-strong); font-weight:600;}
.nav-item .count{
  margin-left:auto; font-size:10.5px; font-family:var(--font-mono); color:var(--ink-faint);
  background:var(--surface-2); padding:1px 6px; border-radius:20px;
}
.nav-item.active .count{background:rgba(0,0,0,0.06); color:var(--amber-strong);}

.sidebar-foot{
  padding:12px; border-top:1px solid var(--rule); display:flex; flex-direction:column; gap:4px;
}
.foot-btn{
  display:flex; align-items:center; gap:8px; background:transparent; border:none; color:var(--ink-soft);
  font-size:12.5px; padding:7px 8px; border-radius:var(--radius-s); text-align:left;
}
.foot-btn:hover{background:var(--surface-2); color:var(--ink);}
.foot-btn svg{width:14px; height:14px;}

/* ---- Main ---- */
.main{margin-left:var(--sidebar-w); flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  position:sticky; top:0; z-index:30; background:var(--paper); border-bottom:1px solid var(--rule);
  display:flex; align-items:center; gap:14px; padding:14px 28px; backdrop-filter: blur(6px);
}
.hamburger{display:none; background:none; border:none; padding:6px; color:var(--ink);}
.hamburger svg{width:20px; height:20px;}
.topbar-title{font-family:var(--font-display); font-size:19px; font-weight:600;}
.search-wrap{
  flex:1; max-width:420px; position:relative; margin-left:8px;
}
.search-wrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--ink-faint);}
.search-input{
  width:100%; padding:8px 12px 8px 34px; border-radius:20px; border:1px solid var(--rule-strong);
  background:var(--surface); color:var(--ink); font-size:13px; font-family:var(--font-body);
}
.search-input:focus{border-color:var(--amber);}
.topbar-spacer{flex:1;}
.icon-btn{
  width:34px; height:34px; border-radius:50%; border:1px solid var(--rule-strong); background:var(--surface);
  display:flex; align-items:center; justify-content:center; color:var(--ink-soft); flex-shrink:0;
  transition:transform var(--transition), background var(--transition);
}
.icon-btn svg{width:16px; height:16px;}
.icon-btn:hover{background:var(--surface-2); color:var(--ink); transform:translateY(-1px);}
.topbar-actions{display:flex; align-items:center; gap:8px;}
.help-pill{
  display:flex; align-items:center; gap:6px; padding:7px 13px 7px 11px; border-radius:20px;
  border:1px solid var(--rule-strong); background:var(--surface); color:var(--ink-soft); font-size:12.5px; font-weight:600;
}
.help-pill svg{width:14px; height:14px;}
.help-pill:hover{background:var(--surface-2); color:var(--ink);}

.content{padding:26px 28px 80px; max-width:1180px; width:100%; margin:0 auto;}
.page-head{margin-bottom:18px;}
.page-head h1{font-size:26px;}
.page-head .sub{color:var(--ink-soft); font-size:13.6px; margin-top:5px; max-width:640px;}

/* ---- Explainer banner ---- */
.explainer-banner{
  background:var(--surface); border:1px solid var(--rule); border-left:4px solid var(--amber);
  border-radius:var(--radius-m); padding:16px 18px; margin-bottom:22px; display:flex; gap:14px;
  box-shadow:var(--shadow-card); align-items:flex-start;
}
.explainer-banner .ico{width:26px; height:26px; flex-shrink:0; color:var(--amber-strong);}
.explainer-banner .body{flex:1; font-size:13.3px; color:var(--ink-soft); line-height:1.55;}
.explainer-banner .body b{color:var(--ink); font-weight:600;}
.explainer-banner .close{background:none; border:none; color:var(--ink-faint); padding:4px; flex-shrink:0;}
.explainer-banner .close:hover{color:var(--ink);}
.explainer-banner .close svg{width:16px; height:16px;}

/* ---- Cards / catalog card (signature element) ---- */
.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px;}
.card{
  background:var(--surface); border:1px solid var(--rule); border-radius:var(--radius-m);
  box-shadow:var(--shadow-card); position:relative; overflow:hidden;
  transition:transform var(--transition), box-shadow var(--transition);
}
.card:hover{transform:translateY(-2px); box-shadow:0 4px 8px rgba(32,36,31,0.08), 0 14px 28px rgba(32,36,31,0.10);}
.card-tab{
  position:absolute; top:0; left:18px; background:var(--ink); color:var(--paper);
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.03em; padding:3px 9px 4px;
  border-radius:0 0 5px 5px; font-weight:600;
}
html[data-theme="dark"] .card-tab{background:var(--amber); color:#191308;}
.card-punch{
  position:absolute; top:11px; right:14px; width:9px; height:9px; border-radius:50%;
  background:var(--paper); border:1px solid var(--rule-strong);
}
.card-body{padding:26px 18px 16px;}
.card-title{font-size:16px; font-weight:600; margin-bottom:6px; padding-right:10px;}
.card-why{font-size:12.6px; color:var(--ink-soft); font-style:italic; margin-bottom:10px; line-height:1.5;}
.card-tags{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
.tag{
  font-size:10.8px; background:var(--surface-2); color:var(--ink-soft); padding:3px 8px; border-radius:20px;
  font-weight:500;
}
.card-actions{display:flex; align-items:center; gap:6px; border-top:1px solid var(--rule); padding:10px 18px; background:var(--surface-2);}
.card-actions .spacer{flex:1;}
.btn{
  border:1px solid var(--rule-strong); background:var(--surface); color:var(--ink); font-size:12.5px; font-weight:600;
  padding:7px 13px; border-radius:var(--radius-s); display:inline-flex; align-items:center; gap:6px;
  transition:background var(--transition), transform var(--transition), border-color var(--transition);
}
.btn svg{width:13px; height:13px;}
.btn:hover{background:var(--surface-2); transform:translateY(-1px);}
.btn-primary{background:var(--amber); border-color:var(--amber-strong); color:#1c1305;}
html[data-theme="dark"] .btn-primary{color:#1c1305;}
.btn-primary:hover{background:var(--amber-strong);}
.btn-ghost{border-color:transparent; background:transparent;}
.btn-ghost:hover{background:var(--surface-2);}
.btn-sm{padding:5px 9px; font-size:11.5px;}
.btn-danger{color:var(--rust); border-color:var(--rust-tint);}
.icon-only{width:32px; height:32px; padding:0; justify-content:center; border-radius:50%;}
.star-btn{background:none; border:none; color:var(--ink-faint); padding:4px; border-radius:50%; flex-shrink:0;}
.star-btn svg{width:17px; height:17px;}
.star-btn.active{color:var(--amber-strong);}
.star-btn:hover{background:var(--surface-2);}

/* expanded editor panel inside card */
.editor{border-top:1px solid var(--rule); padding:16px 18px 18px; background:var(--paper);}
.field{margin-bottom:12px;}
.field label{display:block; font-size:12px; font-weight:600; margin-bottom:4px; color:var(--ink-soft);}
.field input[type=text], .field textarea, .field select{
  width:100%; padding:8px 10px; border:1px solid var(--rule-strong); border-radius:var(--radius-s);
  background:var(--surface); color:var(--ink); font-family:var(--font-body); font-size:13px; resize:vertical;
}
.field textarea{min-height:56px; font-family:var(--font-mono); font-size:12.3px; line-height:1.5;}
.field input:focus, .field textarea:focus, .field select:focus{border-color:var(--amber);}
.preview-box{
  background:var(--ink); color:#EDE9DA; font-family:var(--font-mono); font-size:12px; line-height:1.6;
  padding:14px 16px; border-radius:var(--radius-s); white-space:pre-wrap; word-break:break-word; max-height:280px; overflow-y:auto;
}
html[data-theme="dark"] .preview-box{background:#05070A;}
.preview-box .ph{color:var(--amber-strong); font-weight:600;}
.preview-label{font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); font-weight:600; margin:14px 0 6px;}

/* category section */
.category-section{margin-bottom:34px;}
.category-head{display:flex; align-items:baseline; gap:10px; margin-bottom:4px;}
.category-head h2{font-size:19px;}
.category-head .cat-desc{font-size:12.8px; color:var(--ink-soft); margin-bottom:16px;}

.empty-state{
  border:1px dashed var(--rule-strong); border-radius:var(--radius-m); padding:36px 20px; text-align:center;
  color:var(--ink-soft); font-size:13.5px;
}
.empty-state svg{width:30px; height:30px; color:var(--ink-faint); margin-bottom:10px;}
.empty-state .t{font-weight:600; color:var(--ink); margin-bottom:4px; font-family:var(--font-display); font-size:16px;}

/* filter bar */
.filter-bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; align-items:center;}
.chip{
  padding:6px 13px; border-radius:20px; border:1px solid var(--rule-strong); background:var(--surface);
  font-size:12.3px; font-weight:600; color:var(--ink-soft);
}
.chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
html[data-theme="dark"] .chip.active{background:var(--amber); color:#1c1305; border-color:var(--amber);}
.chip:hover:not(.active){background:var(--surface-2);}
.check-chip{display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; border:1px solid var(--rule-strong); background:var(--surface); font-size:12.3px; color:var(--ink-soft); font-weight:600;}
.check-chip input{accent-color:var(--amber);}

/* ---- Builder layout (Prompt / Loop) ---- */
.builder-grid{display:grid; grid-template-columns:340px 1fr; gap:20px; align-items:start;}
@media (max-width:920px){.builder-grid{grid-template-columns:1fr;}}
.palette{background:var(--surface); border:1px solid var(--rule); border-radius:var(--radius-m); padding:14px; box-shadow:var(--shadow-card); position:sticky; top:80px;}
.palette h3{font-size:14px; margin-bottom:4px;}
.palette .hint{font-size:12px; color:var(--ink-soft); margin-bottom:12px; line-height:1.5;}
.block-btn{
  width:100%; text-align:left; background:var(--paper); border:1px solid var(--rule); border-radius:var(--radius-s);
  padding:10px 12px; margin-bottom:8px; display:block;
}
.block-btn:hover{border-color:var(--amber); background:var(--amber-tint);}
.block-btn .bt-name{font-weight:600; font-size:13px; display:flex; align-items:center; gap:7px;}
.block-btn .bt-name .dot{width:7px; height:7px; border-radius:50%; background:var(--amber); flex-shrink:0;}
.block-btn .bt-desc{font-size:11.6px; color:var(--ink-soft); margin-top:3px; line-height:1.4;}

.assembly{background:var(--surface); border:1px solid var(--rule); border-radius:var(--radius-m); padding:18px; box-shadow:var(--shadow-card);}
.assembly-empty{padding:40px 10px; text-align:center; color:var(--ink-soft);}
.block-instance{border:1px solid var(--rule); border-radius:var(--radius-m); margin-bottom:14px; overflow:hidden;}
.block-instance .bi-head{display:flex; align-items:center; gap:8px; background:var(--surface-2); padding:9px 12px;}
.block-instance .bi-head .dot{width:7px; height:7px; border-radius:50%; background:var(--amber); flex-shrink:0;}
.block-instance .bi-title{font-weight:700; font-size:12.8px; flex:1;}
.block-instance .bi-desc{font-size:11.5px; color:var(--ink-soft); padding:8px 12px 0; line-height:1.4;}
.block-instance .bi-body{padding:10px 12px 12px;}
.bi-tools{display:flex; gap:4px;}
.bi-tools button{background:none; border:none; color:var(--ink-faint); padding:4px; border-radius:4px;}
.bi-tools button:hover{background:var(--surface); color:var(--ink);}
.bi-tools svg{width:14px; height:14px;}

.output-panel{margin-top:18px;}
.output-panel .preview-box{max-height:340px;}
.builder-actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}

/* Loop builder specific */
.loop-field{border:1px solid var(--rule); border-radius:var(--radius-m); padding:14px 16px; margin-bottom:14px; background:var(--surface); box-shadow:var(--shadow-card);}
.loop-field .lf-head{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
.loop-field .lf-head .num{font-family:var(--font-mono); font-size:11px; color:var(--amber-strong); background:var(--amber-tint); padding:2px 7px; border-radius:10px; font-weight:700;}
.loop-field .lf-title{font-weight:700; font-size:14px;}
.loop-field .lf-desc{font-size:12.3px; color:var(--ink-soft); margin-bottom:9px; line-height:1.5;}

/* ---- Modals ---- */
.overlay{
  position:fixed; inset:0; background:rgba(15,17,14,0.5); z-index:100; display:flex; align-items:center; justify-content:center;
  padding:20px; opacity:0; pointer-events:none; transition:opacity var(--transition);
}
.overlay.open{opacity:1; pointer-events:auto;}
.modal{
  background:var(--surface); border-radius:var(--radius-l); max-width:560px; width:100%; max-height:86vh; overflow-y:auto;
  box-shadow:var(--shadow-pop); transform:translateY(10px) scale(0.98); transition:transform var(--transition); border:1px solid var(--rule);
}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal.modal-lg{max-width:640px;}
.modal-head{display:flex; align-items:flex-start; gap:14px; padding:22px 24px 14px;}
.modal-head h2{font-size:20px; flex:1;}
.modal-head .close{background:none; border:none; color:var(--ink-faint); padding:4px; border-radius:6px;}
.modal-head .close:hover{background:var(--surface-2); color:var(--ink);}
.modal-body{padding:0 24px 24px; font-size:13.6px; color:var(--ink-soft); line-height:1.65;}
.modal-body h4{font-size:13px; color:var(--ink); margin:16px 0 6px;}
.modal-body ul{margin:0; padding-left:18px;}
.modal-body li{margin-bottom:6px;}
.modal-foot{padding:16px 24px 22px; display:flex; justify-content:flex-end; gap:8px; border-top:1px solid var(--rule);}
.onboard-steps{display:flex; gap:6px; padding:0 24px 14px;}
.onboard-dot{height:4px; flex:1; border-radius:4px; background:var(--rule-strong);}
.onboard-dot.active{background:var(--amber);}

/* Toast */
.toast-wrap{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center;}
.toast{
  background:var(--ink); color:var(--paper); padding:10px 18px; border-radius:24px; font-size:13px; font-weight:500;
  box-shadow:var(--shadow-pop); display:flex; align-items:center; gap:8px; animation:toast-in 220ms ease;
}
html[data-theme="dark"] .toast{background:var(--amber); color:#1c1305;}
.toast svg{width:15px; height:15px;}
@keyframes toast-in{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* stat cards on dashboard */
.stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:28px;}
.stat-card{background:var(--surface); border:1px solid var(--rule); border-radius:var(--radius-m); padding:16px 18px; box-shadow:var(--shadow-card);}
.stat-card .n{font-family:var(--font-display); font-size:28px; font-weight:700; color:var(--amber-strong);}
.stat-card .l{font-size:12px; color:var(--ink-soft); margin-top:2px;}

.section-fade{animation:section-in 220ms ease;}
@keyframes section-in{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* Settings */
.settings-row{display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--rule); gap:20px;}
.settings-row:last-child{border-bottom:none;}
.settings-row .l1{font-weight:600; font-size:13.6px;}
.settings-row .l2{font-size:12.3px; color:var(--ink-soft); margin-top:2px;}
.switch{position:relative; width:42px; height:24px; border-radius:20px; background:var(--rule-strong); flex-shrink:0; border:none;}
.switch::after{content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--surface); transition:transform var(--transition);}
.switch.on{background:var(--amber);}
.switch.on::after{transform:translateX(18px);}
kbd{background:var(--surface-2); border:1px solid var(--rule-strong); border-bottom-width:2px; border-radius:4px; padding:1px 6px; font-family:var(--font-mono); font-size:11.5px;}

/* Responsive */
@media (max-width:880px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:flex;}
  .topbar{padding:12px 16px;}
  .content{padding:18px 16px 70px;}
  .builder-grid{grid-template-columns:1fr;}
  .palette{position:static;}
}

  builderDraft:'pab_builder_draft', loopDraft:'pab_loop_draft'
};
function loadJSON(key, fallback){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

let state = {
  section: 'dashboard',
  search: '',
  favorites: new Set(loadJSON(LS.favorites, [])),
  custom: loadJSON(LS.custom, []),
  theme: localStorage.getItem(LS.theme) || 'light',
  expandedCard: null,
  filterFav: false,
  filterCat: 'all',
  aboutStep: 0
};
document.documentElement.setAttribute('data-theme', state.theme);

/* =====================================================================
   CATALOG DATA — built-in workflows
===================================================================== */
const CATEGORIES = [
  {id:'context-capsules', label:'Context Capsules', prefix:'CC',
    desc:"Paste-once blocks that carry your project's context into any new chat or model, so you stop re-explaining the same background every time."},
  {id:'data-analysis', label:'Data Analysis & Scripting', prefix:'DA',
    desc:"Templates for turning a dataset and a goal into working Python analysis code — from first look to finished script."},
  {id:'debugging', label:'Debugging & Code Review', prefix:'DBG',
    desc:"Systematic ways to hand an AI an error or a script and get a real diagnosis, not just a quick patch."},
  {id:'reporting', label:'Reporting & Write-ups', prefix:'RPT',
    desc:"Turn finished analysis into methods sections, results paragraphs, summaries and captions in a consistent voice."},
  {id:'literature', label:'Literature & Research', prefix:'LIT',
    desc:"Summarize papers, extract relevance to your question, and spot gaps across a reading list."},
  {id:'learning', label:'Study & Concept Explainers', prefix:'LRN',
    desc:"Turn any AI into a patient tutor — layered explanations and self-testing for concepts you need to actually understand."}
];

function T(strings, ...vals){ return strings.reduce((acc,s,i)=> acc+s+(vals[i]!==undefined?vals[i]:''), ''); }

const CATALOG = [
/* ---------------- CONTEXT CAPSULES ---------------- */
{
  id:'CC-01', category:'context-capsules', title:'Project Context Capsule',
  why:'Paste this at the start of any new chat or model so the AI has your project background immediately — no re-explaining.',
  tags:['reusable','onboarding','any model'],
  template:
`I'm working on a research project. Here is my standing context — treat it as background for everything I ask in this conversation:

PROJECT: {{project_title}}
RESEARCH QUESTION: {{research_question}}
DATASET(S): {{dataset_summary}}
STACK / TOOLS: {{stack}}
KEY DECISIONS ALREADY MADE: {{prior_decisions}}
CURRENT STAGE: {{current_stage}}

Acknowledge you've absorbed this context, then wait for my actual question.`
},
{
  id:'CC-02', category:'context-capsules', title:'Dataset Schema Capsule',
  why:"Describes a dataset's shape and quirks once, so you don't have to paste column lists into every follow-up prompt.",
  tags:['reusable','data'],
  template:
`Here is the schema and known behavior of a dataset I'll be referencing:

DATASET NAME: {{dataset_name}}
SIZE: {{n_rows}} rows × {{n_cols}} columns
COLUMNS (name: type — meaning): {{column_list}}
KNOWN ISSUES (missingness, outliers, encoding quirks): {{known_issues}}
SOURCE / COLLECTION METHOD: {{source}}

Keep this in mind for anything I ask about this dataset in this conversation. Don't restate it back to me — just confirm you have it.`
},
{
  id:'CC-03', category:'context-capsules', title:'Codebase / Repo Context Capsule',
  why:'Summarizes an existing script or repo so a fresh chat can continue the work instead of guessing at your conventions.',
  tags:['reusable','coding'],
  template:
`I'm continuing work on an existing codebase. Context:

REPO PURPOSE: {{repo_purpose}}
KEY FILES / MODULES: {{key_files}}
LANGUAGE & VERSION: {{language_version}}
CONVENTIONS TO FOLLOW (style, naming, structure): {{conventions}}

},
{
  id:'CC-04', category:'context-capsules', title:'Session Handoff Capsule',
  why:'A short end-of-day summary you save and paste tomorrow, so momentum carries over instead of resetting.',
  tags:['reusable','continuity'],
  template:
`Picking up a research session. Here's where things stand:

LAST SESSION DATE: {{session_date}}
WORK COMPLETED: {{work_completed}}
DECISIONS MADE (and why): {{decisions_made}}
OPEN BLOCKERS: {{blockers}}
NEXT STEPS I PLANNED: {{next_steps}}

Help me resume from here — start by suggesting which next step to tackle first and why.`
},

/* ---------------- DATA ANALYSIS & SCRIPTING ---------------- */
{
  id:'DA-01', category:'data-analysis', title:'Exploratory Data Analysis Script Generator',
  why:'Turns a dataset description and a goal into a complete, well-commented first-pass EDA script instead of a blank page.',
  tags:['python','pandas','EDA'],
  variables:[
    {key:'dataset_description', label:'Describe the dataset', type:'textarea', default:'A CSV of 2,400 survey responses with demographic and Likert-scale columns.'},
    {key:'analysis_goal', label:'What are you trying to learn?', type:'textarea', default:'Understand distributions and relationships before modeling.'},
    {key:'libraries_pref', label:'Preferred libraries', type:'select', options:['pandas + matplotlib','pandas + seaborn','polars + plotly','no preference — you choose'], default:'pandas + seaborn'},
    {key:'output_style', label:'Output style', type:'select', options:['heavily commented, teaching style','concise, production style','notebook cells with markdown headers'], default:'heavily commented, teaching style'}
  ],
  template:
`Write a Python exploratory data analysis script.

DATASET: {{dataset_description}}
GOAL: {{analysis_goal}}
LIBRARIES: {{libraries_pref}}
STYLE: {{output_style}}

Include: loading + a first-look summary, missing-value check, distribution plots for numeric columns, a correlation view, and 3-5 bullet observations at the end phrased as hypotheses to test further — not conclusions.`
},
{
  id:'DA-02', category:'data-analysis', title:'Statistical Test Selector & Script',
  why:'Gets you the correct statistical test for your question first, then the code — instead of code for the wrong test.',
  tags:['python','statistics','scipy'],
  variables:[
    {key:'research_question', label:'Your research question', type:'textarea', default:'Does treatment group affect the post-test score, controlling for pre-test?'},
    {key:'data_type', label:'Type of outcome data', type:'select', options:['continuous','categorical / count','ordinal','time-to-event'], default:'continuous'},
    {key:'groups_count', label:'Number of groups being compared', type:'select', options:['2 groups','3+ groups','paired / repeated measures','no groups — relationship between variables'], default:'2 groups'},

OUTCOME TYPE: {{data_type}}
GROUPS: {{groups_count}}

},
{
  id:'DA-03', category:'data-analysis', title:'Data Cleaning Pipeline Builder',
  why:'Converts a messy description of a dataset into a documented, reproducible cleaning pipeline rather than one-off fixes.',

  variables:[
    {key:'messiness_description', label:'What is messy about it?', type:'textarea', default:'Inconsistent date formats, duplicate IDs, free-text country names, some negative ages.'},

TARGET FORMAT: {{target_format}}

},
{
  id:'DA-04', category:'data-analysis', title:'Visualization Spec-to-Code',
  why:'Turns a plain description of the chart you want into working, publication-ready plotting code.',
  tags:['python','matplotlib','seaborn'],
  variables:[
    {key:'chart_type', label:'Chart type', type:'select', options:['grouped bar chart','line chart over time','scatter with trendline','box/violin comparison','heatmap / correlation matrix','faceted small multiples'], default:'box/violin comparison'},
    {key:'x_var', label:'X variable', type:'text', default:'condition'},
    {key:'y_var', label:'Y variable', type:'text', default:'reaction_time_ms'},
    {key:'styling_pref', label:'Styling', type:'select', options:['clean/minimal for a paper (b&w friendly)','presentation slide (bold, high contrast)','exploratory (default theme, fast)'], default:'clean/minimal for a paper (b&w friendly)'}

X: {{x_var}}
Y: {{y_var}}
STYLING: {{styling_pref}}

{

/* =====================================================================
   UTILITIES
===================================================================== */
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, iconSvg){
  const wrap = document.getElementById('toastWrap');
  const t = el(`<div class="toast">${iconSvg||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>'}<span></span></div>`);
  t.querySelector('span').textContent = msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity 300ms'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2200);
}
function copyText(text, label){
  navigator.clipboard.writeText(text).then(()=>toast(label||'Copied to clipboard')).catch(()=>toast('Could not copy — select and copy manually'));
}
function extractVariableKeys(template){
  const set = []; const seen = new Set();
  const re = /{{\s*([a-zA-Z0-9_]+)\s*}}/g; let m;
  while((m = re.exec(template))){ if(!seen.has(m[1])){ seen.add(m[1]); set.push(m[1]); } }
  return set;
}
function labelFromKey(k){ return k.replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase()); }
function getVariableDefs(wf){
  if(wf.variables) return wf.variables;
  return extractVariableKeys(wf.template).map(k=>({
    key:k, label:labelFromKey(k),
    type: /description|summary|code|notes|steps|findings|traceback|snippet|list/.test(k) ? 'textarea' : 'text',
    default:''
  }));
}
function renderTemplatePreview(template, values){
  let html = escapeHtml(template);
  html = html.replace(/{{\s*([a-zA-Z0-9_]+)\s*}}/g, (m,k)=>{
    const v = values[k];
    return `<span class="ph">${v && String(v).trim() ? escapeHtml(v) : '{{'+k+'}}'}</span>`;
  });
  return html;
}
function renderTemplateFinal(template, values){
  return template.replace(/{{\s*([a-zA-Z0-9_]+)\s*}}/g, (m,k)=> (values[k] && String(values[k]).trim()) ? values[k] : `[${labelFromKey(k)}]`);
}

function isFavorite(id){ return state.favorites.has(id); }

}

      <div class="spacer"></div>
      ${isCustom ? `<button class="btn btn-sm btn-ghost" data-edit="${wf.id}">Edit</button><button class="btn btn-sm btn-ghost btn-danger" data-delete="${wf.id}">Delete</button>` : ''}
    </div>
    <div class="editor-slot"></div>
  </div>`;
}

function editorHtml(wf){
  const defs = getVariableDefs(wf);
  const values = {};
  defs.forEach(d=>values[d.key]=d.default||'');
  const fieldsHtml = defs.map(d=>{
    if(d.type==='select'){
      return `<div class="field"><label>${escapeHtml(d.label)}</label>
        <select data-var="${d.key}">${d.options.map(o=>`<option value="${escapeHtml(o)}" ${o===d.default?'selected':''}>${escapeHtml(o)}</option>`).join('')}</select></div>`;
    } else if(d.type==='textarea'){
      return `<div class="field"><label>${escapeHtml(d.label)}</label><textarea data-var="${d.key}" placeholder="${escapeHtml(d.label)}">${escapeHtml(d.default||'')}</textarea></div>`;
    }
    return `<div class="field"><label>${escapeHtml(d.label)}</label><input type="text" data-var="${d.key}" value="${escapeHtml(d.default||'')}" placeholder="${escapeHtml(d.label)}"></div>`;
  }).join('');
  return `
  <div class="editor">
    <div class="preview-label">Fill in the variables</div>
    ${fieldsHtml || '<p style="font-size:12.5px;">This template has no variables — it is ready to copy as-is.</p>'}
    <div class="preview-label">Live preview</div>
    <div class="preview-box" data-preview>${renderTemplatePreview(wf.template, values)}</div>
    <div class="builder-actions">
      <button class="btn btn-primary btn-sm" data-copy-final><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy filled prompt</button>
      <button class="btn btn-sm btn-ghost" data-copy-raw>Copy raw template</button>
    </div>
  </div>`;
}

function wireCard(cardEl, wf){
  cardEl.querySelector('[data-fav]')?.addEventListener('click', ()=> toggleFavorite(wf.id));
  cardEl.querySelector('[data-expand]')?.addEventListener('click', ()=>{
    const slot = cardEl.querySelector('.editor-slot');
    if(slot.childElementCount){ slot.innerHTML=''; return; }
    slot.innerHTML = editorHtml(wf);
    const defs = getVariableDefs(wf);
    const values = {}; defs.forEach(d=>values[d.key]=d.default||'');
    const previewBox = slot.querySelector('[data-preview]');
    slot.querySelectorAll('[data-var]').forEach(inputEl=>{
      inputEl.addEventListener('input', ()=>{
        values[inputEl.dataset.var] = inputEl.value;
        previewBox.innerHTML = renderTemplatePreview(wf.template, values);
      });
    });
    slot.querySelector('[data-copy-final]').addEventListener('click', ()=> copyText(renderTemplateFinal(wf.template, values), 'Filled prompt copied'));
    slot.querySelector('[data-copy-raw]').addEventListener('click', ()=> copyText(wf.template, 'Raw template copied'));
  });
  cardEl.querySelector('[data-duplicate]')?.addEventListener('click', ()=>{
    const copy = Object.assign({}, wf, {id: uniqueId(wf.category), title: wf.title + ' (copy)'});
    state.custom.push(copy); saveCustom(); renderApp();
    toast('Saved an editable copy to My Workflows');
  });
  cardEl.querySelector('[data-edit]')?.addEventListener('click', ()=> openEditModal(wf));
  cardEl.querySelector('[data-delete]')?.addEventListener('click', ()=>{
    if(confirm('Delete "'+wf.title+'"? This cannot be undone.')){
      state.custom = state.custom.filter(c=>c.id!==wf.id);
      state.favorites.delete(wf.id); saveJSON(LS.favorites, Array.from(state.favorites));
      saveCustom(); renderApp(); toast('Workflow deleted');
    }
  });
}

function uniqueId(category){
  const prefixMap = {'context-capsules':'CC','data-analysis':'DA','debugging':'DBG','reporting':'RPT','literature':'LIT','learning':'LRN'};
  const prefix = prefixMap[category] || 'MY';
  let n = 1;
  const existingIds = new Set(allWorkflows().map(w=>w.id));
  while(existingIds.has(`${prefix}-${String(n).padStart(2,'0')}`)) n++;
  return `${prefix}-${String(n).padStart(2,'0')}`;
}

function renderPromptBuilder(){
  return `
  <div class="page-head"><h1>Prompt Builder</h1><div class="sub">Assemble a prompt from labeled building blocks instead of writing one from scratch. Add blocks from the left, fill in each one, and copy the finished prompt from the live preview.</div></div>

        <div class="bt-desc">${bt.desc}</div>
      </button>`).join('')}
    </div>
    <div class="assembly" id="assembly"></div>
  </div>`;
}
function renderAssembly(){
  const wrap = document.getElementById('assembly');
  if(!wrap) return;
  if(!builderBlocks.length){
    wrap.innerHTML = `<div class="assembly-empty">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:8px;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/><path d="M14 2v6h6"/></svg>
      <div style="font-family:var(--font-display); font-size:16px; font-weight:600; margin-bottom:4px;">Your prompt is empty</div>
      Add building blocks from the left — start with Role and Objective, they matter most.
    </div>`;
    return;
  }
  wrap.innerHTML = builderBlocks.map((b,i)=>{
    const bt = BLOCK_TYPES.find(x=>x.key===b.type);
    return `
    <div class="block-instance" data-idx="${i}">
      <div class="bi-head">
        <span class="dot"></span><span class="bi-title">${bt.name}</span>
        <div class="bi-tools">
          <button data-move="-1" title="Move up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"/></svg></button>
          <button data-move="1" title="Move down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
          <button data-remove title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>
      </div>
      <div class="bi-desc">${bt.desc}</div>
      <div class="bi-body">
        <select data-preset>
          ${bt.options.map(o=>`<option value="${escapeHtml(o)}" ${o===b.value?'selected':''}>${escapeHtml(o)}</option>`).join('')}
        </select>
        ${b.value==='Custom…' || !bt.options.includes(b.value) ? `<textarea data-custom placeholder="Write your own ${bt.name.toLowerCase()}…" style="margin-top:8px; width:100%; min-height:56px; font-family:var(--font-body); font-size:13px; padding:8px 10px; border:1px solid var(--rule-strong); border-radius:6px; background:var(--surface); color:var(--ink);">${escapeHtml(b.custom||'')}</textarea>` : ''}
      </div>
    </div>`;
  }).join('') + `
  <div class="output-panel">
    <div class="preview-label">Live preview</div>
    <div class="preview-box" id="builderPreview"></div>
    <div class="builder-actions">
      <button class="btn btn-primary btn-sm" id="copyBuilderBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy full prompt</button>
      <button class="btn btn-sm" id="saveBuilderBtn">Save as a workflow</button>
      <button class="btn btn-sm btn-ghost" id="clearBuilderBtn">Clear all</button>
    </div>
  </div>`;
  wrap.querySelectorAll('.block-instance').forEach(instEl=>{
    const idx = +instEl.dataset.idx;
    instEl.querySelector('[data-move="-1"]').addEventListener('click', ()=>{ if(idx>0){ [builderBlocks[idx-1],builderBlocks[idx]]=[builderBlocks[idx],builderBlocks[idx-1]]; persistBuilder(); renderAssembly(); }});
    instEl.querySelector('[data-move="1"]').addEventListener('click', ()=>{ if(idx<builderBlocks.length-1){ [builderBlocks[idx+1],builderBlocks[idx]]=[builderBlocks[idx],builderBlocks[idx+1]]; persistBuilder(); renderAssembly(); }});
    instEl.querySelector('[data-remove]').addEventListener('click', ()=>{ builderBlocks.splice(idx,1); persistBuilder(); renderAssembly(); });
    instEl.querySelector('[data-preset]').addEventListener('change', (e)=>{ builderBlocks[idx].value = e.target.value; persistBuilder(); renderAssembly(); });
    const customEl = instEl.querySelector('[data-custom]');
    if(customEl) customEl.addEventListener('input', (e)=>{ builderBlocks[idx].custom = e.target.value; persistBuilder(); updateBuilderPreview(); });
  });
  document.getElementById('copyBuilderBtn').addEventListener('click', ()=> copyText(buildPromptText(), 'Prompt copied'));
  document.getElementById('saveBuilderBtn').addEventListener('click', saveBuilderAsWorkflow);
  document.getElementById('clearBuilderBtn').addEventListener('click', ()=>{ if(confirm('Clear the whole prompt?')){ builderBlocks=[]; persistBuilder(); renderAssembly(); }});
  updateBuilderPreview();
}
function persistBuilder(){ saveJSON(LS.builderDraft, builderBlocks); }
function buildPromptText(){
  return builderBlocks.map(b=>{
    const bt = BLOCK_TYPES.find(x=>x.key===b.type);
    const val = (b.value==='Custom…') ? (b.custom||'') : b.value;
    return `[${bt.name}]\n${val}`;
  }).join('\n\n');
}
function updateBuilderPreview(){
  const box = document.getElementById('builderPreview');
  if(!box) return;
  box.textContent = buildPromptText() || '(add blocks to see your prompt build up here)';
}
function saveBuilderAsWorkflow(){
  if(!builderBlocks.length){ toast('Add at least one block first'); return; }
  const title = prompt('Name this workflow:', 'My custom prompt');
  if(!title) return;
  const id = uniqueId('context-capsules');
  const template = buildPromptText().replace(/\n/g, '\\n');
  state.custom.push({id, category:'context-capsules', title, why:'A custom prompt built with the Prompt Builder.', tags:['custom','prompt-builder'], template: buildPromptText()});
  saveCustom(); toast('Saved to My Workflows'); 
}

let loopState = loadJSON(LS.loopDraft, {base:'', goal:'', eval_criteria:'', improvement_strategy:'', stop_conditions:'', safety_rules:''});
function renderLoopBuilder(){
  return `
  <div class="page-head"><h1>Loop Builder</h1><div class="sub">Turn any one-shot prompt into a self-checking loop that keeps refining its own output until it meets criteria you set, or stops safely. Fill in each field below — the assembled loop prompt updates live on the right.</div></div>

        <div class="lf-desc">${f.desc}</div>
        <textarea data-loop="${f.key}" style="width:100%; min-height:60px; font-family:var(--font-body); font-size:13px; padding:9px; border:1px solid var(--rule-strong); border-radius:6px; background:var(--surface); color:var(--ink);" placeholder="${escapeHtml(f.ph)}">${escapeHtml(loopState[f.key])}</textarea>
      </div>`).join('')}
    </div>
    <div class="assembly">
      <div class="preview-label" style="margin-top:0;">Live preview — assembled loop prompt</div>
      <div class="preview-box" id="loopPreview" style="max-height:520px;"></div>
      <div class="builder-actions">
        <button class="btn btn-primary btn-sm" id="copyLoopBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy loop prompt</button>
        <button class="btn btn-sm" id="saveLoopBtn">Save as a workflow</button>
      </div>
    </div>
  </div>`;
}
function buildLoopText(){
  return `Run the following as an autonomous improvement loop.

TASK: ${loopState.base || '[base prompt not set]'}

GOAL: ${loopState.goal || '[not set]'}
EVALUATION CRITERIA: ${loopState.eval_criteria || '[not set]'}
IMPROVEMENT STRATEGY: ${loopState.improvement_strategy || '[not set]'}
STOP CONDITIONS: ${loopState.stop_conditions || '[not set]'}
SAFETY RULES (never violate, even to satisfy the goal): ${loopState.safety_rules || '[not set]'}

Process: attempt the task, evaluate your own output against the criteria above, and if it falls short, apply the improvement strategy and try again. Report each round briefly (what changed, why). Stop the moment a stop condition is met, and clearly state which one.`;
}
function wireLoopBuilder(){
  const preview = document.getElementById('loopPreview');
  function refresh(){ preview.textContent = buildLoopText(); saveJSON(LS.loopDraft, loopState); }
  document.getElementById('loopBase').addEventListener('input', e=>{ loopState.base = e.target.value; refresh(); });
  document.querySelectorAll('[data-loop]').forEach(t=>{
    t.addEventListener('input', e=>{ loopState[e.target.dataset.loop] = e.target.value; refresh(); });
  });
  document.getElementById('pullFromBuilder').addEventListener('click', ()=>{
    const txt = buildPromptText();
    if(!txt){ toast('Your Prompt Builder is empty'); return; }
    loopState.base = txt; document.getElementById('loopBase').value = txt; refresh();
    toast('Pulled from Prompt Builder');
  });
  document.getElementById('copyLoopBtn').addEventListener('click', ()=> copyText(buildLoopText(), 'Loop prompt copied'));
  document.getElementById('saveLoopBtn').addEventListener('click', ()=>{
    const title = prompt('Name this loop workflow:', 'My autonomous loop');
    if(!title) return;
    const id = uniqueId('context-capsules');
    state.custom.push({id, category:'context-capsules', title, why:'A self-checking loop prompt built with the Loop Builder.', tags:['custom','loop-builder'], template: buildLoopText()});
    saveCustom(); toast('Saved to My Workflows');
  });
  refresh();
}

function renderApp(){

  let html = '';
  switch(state.section){
    case 'dashboard': html = renderDashboard(); break;
    case 'context-capsules': case 'data-analysis': case 'debugging': case 'reporting': case 'literature': case 'learning':
      html = renderCategoryPage(state.section); break;
    case 'prompt-builder': html = renderPromptBuilder(); break;
    case 'loop-builder': html = renderLoopBuilder(); break;
    case 'my-workflows': html = renderMyWorkflows(); break;
    case 'settings': html = renderSettings(); break;

  wirePageEvents();

}

function wirePageEvents(){
  // cards
  document.querySelectorAll('.card[data-id]').forEach(cardEl=>{

    localStorage.setItem(LS.bannerDismissed,'1'); renderApp();
  });

===================================================================== */
function doExport(){
  const data = { custom: state.custom, favorites: Array.from(state.favorites), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'ai-playbook-export.json'; a.click();
  toast('Exported — check your downloads');
}
function doImport(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(Array.isArray(data.custom)){ state.custom = data.custom; saveCustom(); }
      if(Array.isArray(data.favorites)){ state.favorites = new Set(data.favorites); saveJSON(LS.favorites, data.favorites); }
      renderApp(); toast('Import complete');
    }catch(err){ toast('That file could not be read'); }
  };
  reader.readAsText(file);
}
function doReset(){
  if(!confirm('This deletes all custom workflows, favorites, and preferences from this browser. Continue?')) return;
  Object.values(LS).forEach(k=>localStorage.removeItem(k));
  state.custom=[]; state.favorites=new Set(); builderBlocks=[]; 
  loopState = {base:'', goal:'', eval_criteria:'', improvement_strategy:'', stop_conditions:'', safety_rules:''};
  renderApp(); toast('Everything has been reset');
}

document.getElementById('aboutNextBtn').addEventListener('click', ()=>{
  if(state.aboutStep < ABOUT_STEPS.length-1){ state.aboutStep++; renderAboutStep(); }
  else { closeOverlay('aboutOverlay'); localStorage.setItem(LS.seenOnboarding,'1'); }
});
document.getElementById('aboutPrevBtn').addEventListener('click', ()=>{ if(state.aboutStep>0){ state.aboutStep--; renderAboutStep(); }});

/* =====================================================================
   GENERIC OVERLAY HANDLING
===================================================================== */
function openOverlay(id){ document.getElementById(id).classList.add('open'); }
function closeOverlay(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('[data-close]').forEach(btn=>{
  btn.addEventListener('click', ()=> closeOverlay(btn.dataset.close));
});
document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click', (e)=>{ if(e.target===ov) closeOverlay(ov.id); });
});
document.getElementById('shortcutsBtn').addEventListener('click', ()=> openOverlay('shortcutsOverlay'));
document.getElementById('exportBtn').addEventListener('click', doExport);

/* =====================================================================
   KEYBOARD SHORTCUTS
===================================================================== */
const SECTION_ORDER = ['dashboard','context-capsules','data-analysis','debugging','reporting','literature','learning','prompt-builder','loop-builder'];
document.addEventListener('keydown', (e)=>{
  const tag = (e.target.tagName||'').toLowerCase();
  const typing = tag==='input' || tag==='textarea' || tag==='select';
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(ov=>closeOverlay(ov.id));
    return;
  }
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='b'){ e.preventDefault(); toggleTheme(); return; }
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='e'){ e.preventDefault(); doExport(); return; }
  if(typing) return;
  if(e.key==='/'){ e.preventDefault(); document.getElementById('globalSearch').focus(); return; }
  if(/^[1-9]$/.test(e.key)){
    const idx = +e.key - 1;
    if(SECTION_ORDER[idx]){ state.section = SECTION_ORDER[idx]; renderApp(); }
  }
});

/* =====================================================================
   INIT
===================================================================== */
renderApp();
if(localStorage.getItem(LS.seenOnboarding) !== '1'){
  setTimeout(()=>{ openAbout(); }, 350);
}
</script>
</body>
